<style>
  *,*::before,*::after{box-sizing:border-box}
  :root{
    --bg:#0a0a0a;
    --bg-1:#101010;
    --bg-2:#161616;
    --bg-3:#1d1d1d;
    --line:#262626;
    --line-2:#333;
    --txt:#f4f4f4;
    --txt-2:#a3a3a3;
    --txt-3:#737373;
    --gold:#d4a574;
    --gold-2:#e8c89a;
    --gold-dim:#7a5f43;
    --green:#7fb069;
    --red:#e57373;
    --blue:#7eb6e8;
    --shadow:0 12px 40px rgba(0,0,0,.5);
  }
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,-apple-system,sans-serif;font-feature-settings:'cv11','ss01','ss03';-webkit-font-smoothing:antialiased}
  body{min-height:100vh}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:var(--bg-1)}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace}

  /* Layout */
  .app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}
  header.bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;border-bottom:1px solid var(--line);background:rgba(10,10,10,.75);
    backdrop-filter:blur(12px);position:sticky;top:0;z-index:50;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand .mark{
    width:38px;height:38px;border-radius:9px;background:var(--bg-3);
    display:grid;place-items:center;border:1px solid var(--line-2);
  }
  .brand .mark svg{width:18px;height:18px;color:var(--gold)}
  .brand .title{font-weight:700;font-size:17px;letter-spacing:-0.01em}
  .brand .sub{font-size:11px;color:var(--txt-3);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}

  nav.menu{display:flex;align-items:center;gap:6px}
  nav.menu a{
    color:var(--txt-2);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:7px;transition:all .15s;
  }
  nav.menu a:hover{color:var(--txt);background:var(--bg-2)}
  nav.menu a.active{color:var(--gold);background:rgba(212,165,116,.08)}

  main{display:grid;grid-template-columns:340px 1fr;min-height:0}
  @media(max-width:900px){main{grid-template-columns:1fr}}

  aside.sidebar{
    border-right:1px solid var(--line);background:var(--bg-1);
    display:flex;flex-direction:column;min-height:0;
  }
  .input-row{padding:18px;border-bottom:1px solid var(--line)}
  .input-row form{display:flex;gap:8px}
  .input-row input{
    flex:1;background:var(--bg-2);border:1px solid var(--line-2);color:var(--txt);
    padding:11px 14px;border-radius:8px;font-size:13.5px;font-family:'JetBrains Mono',monospace;outline:none;transition:border .15s;
  }
  .input-row input:focus{border-color:var(--gold-dim)}
  .input-row input::placeholder{color:var(--txt-3)}
  .input-row button{
    background:var(--gold);color:#1a1208;border:none;padding:0 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;letter-spacing:.02em;transition:all .15s;
  }
  .input-row button:hover{background:var(--gold-2)}
  .input-row button:disabled{opacity:.5;cursor:not-allowed}

  .filters{display:flex;gap:6px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--bg-1)}
  .filters .chip{
    background:transparent;border:1px solid var(--line-2);color:var(--txt-2);
    padding:5px 11px;border-radius:99px;font-size:11.5px;cursor:pointer;font-weight:500;transition:all .15s;
  }
  .filters .chip.active{background:var(--gold);color:#1a1208;border-color:var(--gold)}
  .filters .chip:hover:not(.active){border-color:var(--gold-dim);color:var(--txt)}

  .list{flex:1;overflow:auto}
  .item{
    padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s;display:flex;gap:12px;align-items:flex-start;
  }
  .item:hover{background:var(--bg-2)}
  .item.selected{background:var(--bg-2);border-left:2px solid var(--gold);padding-left:16px}
  .item .platform-pill{
    flex-shrink:0;width:28px;height:28px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:700;
  }
  .pill-youtube{background:#3a1a1a;color:#ff6b6b}
  .pill-tiktok{background:#0d2329;color:#4dd0e1}
  .pill-instagram{background:#2a1a2a;color:#e573b3}
  .pill-other{background:var(--bg-3);color:var(--txt-3)}
  .item .body{flex:1;min-width:0}
  .item .title{font-size:13.5px;font-weight:500;color:var(--txt);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35}
  .item .meta{font-size:11px;color:var(--txt-3);margin-top:4px;display:flex;gap:8px;align-items:center}
  .item .star{color:var(--gold);font-size:13px}
  .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .status-pending{background:#ffa726;animation:pulse 1.5s infinite}
  .status-processing{background:var(--blue);animation:pulse 1.2s infinite}
  .status-done{background:var(--green)}
  .status-failed{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .empty{padding:50px 24px;text-align:center;color:var(--txt-3);font-size:13px;line-height:1.6}
  .empty .big{color:var(--txt-2);font-size:14px;font-weight:500;margin-bottom:6px}

  /* Main content */
  section.detail{overflow:auto;padding:36px 48px;max-width:920px;width:100%}
  @media(max-width:900px){section.detail{padding:24px}}
  .detail-empty{
    height:100%;display:grid;place-items:center;color:var(--txt-3);text-align:center;padding:40px;
  }
  .detail-empty .hero{max-width:520px}
  .detail-empty h1{font-size:28px;margin:0 0 14px;color:var(--txt);font-weight:700;letter-spacing:-0.02em}
  .detail-empty p{font-size:15px;line-height:1.65}
  .detail-empty .examples{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:24px}
  .detail-empty .example{background:var(--bg-2);border:1px solid var(--line);padding:6px 12px;border-radius:99px;font-size:12px;color:var(--txt-2);cursor:pointer}
  .detail-empty .example:hover{border-color:var(--gold-dim);color:var(--txt)}

  .card-title{font-size:24px;font-weight:700;letter-spacing:-0.02em;margin:0 0 6px;line-height:1.3}
  .card-meta{display:flex;gap:14px;flex-wrap:wrap;color:var(--txt-3);font-size:13px;margin-bottom:24px}
  .card-meta a{color:var(--txt-2);text-decoration:none;border-bottom:1px solid var(--line-2)}
  .card-meta a:hover{color:var(--gold)}
  .card-meta .sep{color:var(--line-2)}

  .card-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px}
  .btn{
    display:inline-flex;align-items:center;gap:7px;background:var(--bg-2);border:1px solid var(--line-2);color:var(--txt);
    padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;text-decoration:none;
  }
  .btn:hover{border-color:var(--gold-dim);background:var(--bg-3)}
  .btn.primary{background:var(--gold);color:#1a1208;border-color:var(--gold);font-weight:600}
  .btn.primary:hover{background:var(--gold-2);border-color:var(--gold-2)}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn.ghost{background:transparent}

  .section{margin-bottom:36px}
  .section h3{
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:0 0 12px;
  }
  .section .body{font-size:14.5px;line-height:1.65;color:var(--txt)}
  .section ul{margin:0;padding:0 0 0 18px}
  .section li{margin-bottom:6px;line-height:1.55}

  .cta-card{
    background:linear-gradient(135deg,rgba(212,165,116,.08),rgba(212,165,116,.02));
    border:1px solid var(--gold-dim);border-radius:12px;padding:20px 22px;
  }
  .cta-card .label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px}
  .cta-card .text{font-size:15.5px;line-height:1.6;color:var(--txt);font-weight:500}

  .transcript{
    background:var(--bg-1);border:1px solid var(--line);border-radius:10px;padding:18px 20px;
    font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;color:var(--txt-2);
    max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-word;
  }
  .transcript-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .transcript-source{font-size:11px;color:var(--txt-3);font-family:'JetBrains Mono',monospace}

  .verify-row{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .verify-row:last-child{border-bottom:none}
  .verify-status{
    flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
    padding:3px 8px;border-radius:99px;margin-top:2px;
  }
  .vs-verified{background:rgba(127,176,105,.15);color:var(--green)}
  .vs-unverified{background:rgba(255,167,38,.15);color:#ffa726}
  .vs-contradicted{background:rgba(229,115,115,.15);color:var(--red)}

  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
    display:grid;place-items:center;padding:20px;backdrop-filter:blur(4px);
  }
  .modal{
    background:var(--bg-1);border:1px solid var(--line-2);border-radius:14px;
    max-width:760px;width:100%;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);
  }
  .modal header{
    padding:18px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;
  }
  .modal header h2{margin:0;font-size:17px;font-weight:600}
  .modal header .close{background:transparent;border:none;color:var(--txt-3);font-size:22px;cursor:pointer;padding:4px 8px}
  .modal header .close:hover{color:var(--txt)}
  .modal .content{padding:24px;overflow:auto;flex:1}
  .modal .content textarea{
    width:100%;min-height:360px;background:var(--bg-2);border:1px solid var(--line-2);color:var(--txt);
    border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.55;resize:vertical;
  }
  .modal footer{
    padding:14px 24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .hint{font-size:12px;color:var(--txt-3);line-height:1.55}

  .mode-banner{
    background:var(--bg-2);border:1px solid var(--line-2);border-radius:10px;padding:14px 18px;margin-bottom:24px;
    display:flex;align-items:flex-start;gap:14px;
  }
  .mode-banner .icon{font-size:20px;margin-top:2px}
  .mode-banner .text{flex:1;font-size:13.5px;line-height:1.55;color:var(--txt-2)}
  .mode-banner .text b{color:var(--txt)}
  .mode-banner button{
    background:transparent;border:1px solid var(--line-2);color:var(--txt-2);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;
  }
  .mode-banner button:hover{border-color:var(--gold-dim);color:var(--txt)}

  footer.foot{
    padding:18px 28px;border-top:1px solid var(--line);background:var(--bg-1);
    display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--txt-3);
  }
  footer.foot a{color:var(--gold);text-decoration:none;font-weight:500}
  footer.foot a:hover{color:var(--gold-2)}

  .toast-wrap{position:fixed;top:80px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
  .toast{
    background:var(--bg-2);border:1px solid var(--line-2);border-left:3px solid var(--gold);color:var(--txt);
    padding:11px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow);min-width:240px;animation:slideIn .25s;
  }
  .toast.error{border-left-color:var(--red)}
  .toast.success{border-left-color:var(--green)}
  @keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

  .spinner{
    display:inline-block;width:13px;height:13px;border:2px solid var(--line-2);border-top-color:var(--gold);
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useMemo, useCallback, useRef } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

const CONFIG = {
  SUPABASE_URL: 'https://vaerkevjrupxdbgrxfkk.supabase.co',
  SUPABASE_ANON_KEY: 'sb_publishable_elUUmJXjGMXfJ8RBhZkBvA_yTeSjXR_',
  BACKEND_URL: localStorage.getItem('vi_backend_url') || '',
};

const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const detectPlatform = (url) => {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('tiktok.com')) return 'tiktok';
  if (u.includes('instagram.com')) return 'instagram';
  return 'other';
};

const platformLabel = (p) => ({youtube:'YT',tiktok:'TT',instagram:'IG',other:'?'}[p] || '?');

const fmtRelative = (iso) => {
  if (!iso) return '';
  const t = new Date(iso).getTime();
  const now = Date.now();
  const s = Math.floor((now - t) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
};

const fmtDuration = (sec) => {
  if (!sec) return '';
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
};

const buildSkillPrompt = (link) => {
  const dt = new Date().toISOString().slice(0,10);
  return `# New Skill Request — generated by Video Intel on ${dt}

## Source video
- Platform: ${link.platform || 'unknown'}
- URL: ${link.url}
- Title: ${link.title || '(untitled)'}
- Author: ${link.author || '(unknown)'}
- Duration: ${link.duration_sec || '?'}s

## What the video taught
${link.summary || '(no summary captured)'}

${(link.key_points && link.key_points.length) ? '## Key points\n' + link.key_points.map(k => '- ' + k).join('\n') + '\n' : ''}
## Skill concept
${link.skill_description || '(describe the skill in one sentence)'}

## Build instructions for Claude / Claude Code

Please build a new skill in my Makabi Agent OS based on this video lesson.

1. Read \`~/.claude/skills/skill-creator/SKILL.md\` first so you follow the standard skill format.
2. Create a new skill folder: \`~/.claude/skills/<short-kebab-name>/\` with:
   - \`SKILL.md\` — name, description (with trigger phrases), full instructions in operator voice
   - \`scripts/\` — any helper scripts (Python preferred, Node OK) that automate the workflow
   - \`references/\` — supporting docs (setup notes, examples)
3. Trigger phrases must be specific to what Master Makabi would actually say when this situation comes up — not generic.
4. Tie the skill's outputs concretely to one or more of: BRiX, Loren AI, 1PM AI, MTIP, BroadBridge.
5. Register the skill in the manifest, run the smoke test, confirm \`list_skills\` surfaces it.
6. Source transcript follows below — use it as ground truth for what the video actually said.

---
## TRANSCRIPT (verbatim)
${link.transcript || '(no transcript)'}
---

Sign off as "Mike" if you write any test artifacts.`;
};

const buildLocalPowershell = (url) => {
  return `python "C:\\Users\\mike\\Documents\\video-intel\\scripts\\transcribe.py" "${url}" --json | Set-Clipboard
Write-Host "Transcript JSON copied to clipboard. Paste it back into the Video Intel UI."`;
};

const Icon = ({ name, ...props }) => {
  const paths = {
    play: <path d="M8 5v14l11-7z"/>,
    plus: <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>,
    star: <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>,
    starOff: <path d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.04L22 9.24z"/>,
    copy: <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>,
    delete: <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>,
    sparkle: <path d="M12 2L9.3 8.6 2 12l7.3 3.4L12 22l2.7-6.6L22 12l-7.3-3.4L12 2z"/>,
    download: <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>,
  };
  return (
    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" {...props}>
      {paths[name] || null}
    </svg>
  );
};

const Toast = ({ toasts }) => (
  <div className="toast-wrap">
    {toasts.map(t => (
      <div key={t.id} className={'toast ' + (t.type || '')}>{t.msg}</div>
    ))}
  </div>
);

const Header = ({ activeTab, setActiveTab, onSettings }) => (
  <header className="bar">
    <div className="brand">
      <div className="mark">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div>
        <div className="title">Video Intel</div>
        <div className="sub">Loren AI · Tools</div>
      </div>
    </div>
    <nav className="menu">
      <a href="#" onClick={(e)=>{e.preventDefault();setActiveTab('all')}} className={activeTab==='all'?'active':''}>All</a>
      <a href="#" onClick={(e)=>{e.preventDefault();setActiveTab('starred')}} className={activeTab==='starred'?'active':''}>Starred</a>
      <a href="#" onClick={(e)=>{e.preventDefault();setActiveTab('skills')}} className={activeTab==='skills'?'active':''}>Skill drafts</a>
      <a href="#" onClick={(e)=>{e.preventDefault();onSettings()}}>Settings</a>
    </nav>
  </header>
);

const Sidebar = ({ links, selectedId, onSelect, onSubmit, busy, filter, setFilter }) => {
  const inputRef = useRef(null);
  const submit = (e) => {
    e.preventDefault();
    const v = inputRef.current.value.trim();
    if (!v) return;
    onSubmit(v);
    inputRef.current.value = '';
  };
  return (
    <aside className="sidebar">
      <div className="input-row">
        <form onSubmit={submit}>
          <input ref={inputRef} type="text" placeholder="Paste TikTok / Reel / YouTube URL…" disabled={busy} autoFocus />
          <button type="submit" disabled={busy}>{busy ? <span className="spinner"/> : '+ Add'}</button>
        </form>
      </div>
      <div className="filters">
        {['all','youtube','tiktok','instagram'].map(p => (
          <button key={p} className={'chip ' + (filter===p?'active':'')} onClick={()=>setFilter(p)}>{p}</button>
        ))}
      </div>
      <div className="list">
        {links.length === 0 ? (
          <div className="empty">
            <div className="big">No videos yet</div>
            Paste a TikTok, Instagram Reel, or YouTube URL above to start.
          </div>
        ) : (
          links.map(l => (
            <div key={l.id} className={'item ' + (selectedId===l.id?'selected':'')} onClick={()=>onSelect(l.id)}>
              <div className={'platform-pill pill-' + (l.platform || 'other')}>{platformLabel(l.platform)}</div>
              <div className="body">
                <div className="title">
                  {l.starred && <span className="star">★ </span>}
                  {l.title || l.url}
                </div>
                <div className="meta">
                  <span className={'status-dot status-' + (l.status||'pending')} />
                  <span>{l.author || '—'}</span>
                  <span>·</span>
                  <span>{fmtRelative(l.created_at)}</span>
                </div>
              </div>
            </div>
          ))
        )}
      </div>
    </aside>
  );
};

const DetailEmpty = ({ onExample }) => (
  <div className="detail-empty">
    <div className="hero">
      <h1>Drop a video link.<br/>Get a skill.</h1>
      <p>
        Video Intel pulls the transcript, researches what the video claims, writes you a
        clean summary and a concrete next step tied to your ventures, and — when the video
        teaches a repeatable workflow — gives you a one-click prompt you can paste into
        Claude to build that workflow as a real skill in your Agent OS.
      </p>
      <div className="examples">
        <span style={{color:'var(--txt-3)',fontSize:12,marginRight:6}}>Try:</span>
        <span className="example" onClick={()=>onExample('https://www.youtube.com/watch?v=jNQXAC9IVRw')}>
          youtube.com (smoke test)
        </span>
      </div>
    </div>
  </div>
);

const Detail = ({ link, onUpdate, onDelete, onShowPrompt, onPasteJSON, onShowLocalCmd, toast }) => {
  if (!link) return null;
  const isPending = link.status === 'pending' || link.status === 'processing';
  const isDone = link.status === 'done';
  const isFailed = link.status === 'failed';
  const hasBackend = !!CONFIG.BACKEND_URL;

  const copyText = (text, label) => {
    navigator.clipboard.writeText(text);
    toast(label + ' copied');
  };

  return (
    <section className="detail">
      {!hasBackend && (
        <div className="mode-banner">
          <div className="icon">⚡</div>
          <div className="text">
            <b>Local mode active.</b> No transcription backend configured yet.
            Click "Run locally" to copy a PowerShell command — run it on your Windows box
            and the result auto-fills.
          </div>
          <button onClick={()=>{
            const url = prompt('Backend URL (Render service, etc.) — leave empty for local mode:', CONFIG.BACKEND_URL || '');
            if (url !== null) {
              localStorage.setItem('vi_backend_url', url);
              location.reload();
            }
          }}>Configure backend</button>
        </div>
      )}

      <h1 className="card-title">{link.title || '(no title yet)'}</h1>
      <div className="card-meta">
        <span>{link.platform || '—'}</span>
        <span className="sep">·</span>
        <span>{link.author || '—'}</span>
        {link.duration_sec ? <><span className="sep">·</span><span>{fmtDuration(link.duration_sec)}</span></> : null}
        <span className="sep">·</span>
        <a href={link.url} target="_blank" rel="noreferrer">view source ↗</a>
        <span className="sep">·</span>
        <span className={'status-dot status-' + (link.status||'pending')} style={{marginRight:4}} />
        <span style={{color:'var(--txt-2)'}}>{link.status}</span>
      </div>

      <div className="card-actions">
        <button className="btn" onClick={()=>onUpdate(link.id, {starred: !link.starred})}>
          <Icon name={link.starred?'starOff':'star'} />
          {link.starred ? 'Unstar' : 'Star'}
        </button>
        {isDone && (
          <button className="btn primary" onClick={()=>onShowPrompt(link)}>
            <Icon name="sparkle" />
            Generate skill prompt
          </button>
        )}
        {!hasBackend && isPending && (
          <>
            <button className="btn" onClick={()=>onShowLocalCmd(link)}>
              <Icon name="copy" />
              Run locally
            </button>
            <button className="btn" onClick={()=>onPasteJSON(link)}>
              <Icon name="download" />
              Paste JSON result
            </button>
          </>
        )}
        <button className="btn danger" onClick={()=>{
          if (confirm('Delete this entry?')) onDelete(link.id);
        }}>
          <Icon name="delete" />
          Delete
        </button>
      </div>

      {isPending && !link.transcript && (
        <div className="section">
          <div className="body" style={{color:'var(--txt-3)',padding:'18px 0'}}>
            <span className="spinner" style={{marginRight:10,verticalAlign:'-2px'}}/>
            {hasBackend ? 'Transcription in progress…' : 'Waiting for you to run locally and paste back the JSON.'}
          </div>
        </div>
      )}

      {isFailed && link.error && (
        <div className="section">
          <h3>Error</h3>
          <div className="body" style={{color:'var(--red)',background:'rgba(229,115,115,.08)',padding:14,borderRadius:8,border:'1px solid rgba(229,115,115,.3)',fontFamily:'JetBrains Mono,monospace',fontSize:13}}>
            {link.error}
          </div>
        </div>
      )}

      {link.summary && (
        <div className="section">
          <h3>Summary</h3>
          <div className="body">{link.summary}</div>
        </div>
      )}

      {link.key_points && link.key_points.length > 0 && (
        <div className="section">
          <h3>Key Points</h3>
          <ul className="body">
            {link.key_points.map((k,i)=><li key={i}>{k}</li>)}
          </ul>
        </div>
      )}

      {link.verification && link.verification.length > 0 && (
        <div className="section">
          <h3>Verification</h3>
          <div>
            {link.verification.map((v,i)=>(
              <div key={i} className="verify-row">
                <span className={'verify-status vs-'+(v.status||'unverified')}>{v.status||'?'}</span>
                <div style={{flex:1}}>
                  <div style={{color:'var(--txt)'}}>{v.claim}</div>
                  {v.note && <div style={{color:'var(--txt-3)',fontSize:12,marginTop:3}}>{v.note}</div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {link.call_to_action && (
        <div className="section">
          <div className="cta-card">
            <div className="label">Call to action</div>
            <div className="text">{link.call_to_action}</div>
          </div>
        </div>
      )}

      {link.transcript && (
        <div className="section">
          <h3 style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Transcript</span>
            <button className="btn ghost" style={{fontSize:11,padding:'4px 8px'}} onClick={()=>copyText(link.transcript,'Transcript')}>
              <Icon name="copy"/> copy
            </button>
          </h3>
          <div className="transcript-header">
            <span className="transcript-source">source: {link.transcript_source || 'unknown'}</span>
          </div>
          <div className="transcript">{link.transcript}</div>
        </div>
      )}
    </section>
  );
};

const PromptModal = ({ link, onClose, toast }) => {
  const [prompt, setPrompt] = useState(buildSkillPrompt(link));
  const [savedPrompt, setSavedPrompt] = useState(link.skill_prompt);

  const save = async () => {
    const { error } = await sb.from('vi_links').update({ skill_prompt: prompt, skill_candidate: true }).eq('id', link.id);
    if (error) { toast('Save failed: ' + error.message, 'error'); return; }
    setSavedPrompt(prompt);
    toast('Prompt saved', 'success');
  };

  const copy = () => {
    navigator.clipboard.writeText(prompt);
    toast('Prompt copied — paste into Claude / Claude Code', 'success');
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <header>
          <h2>Skill prompt — paste into Claude</h2>
          <button className="close" onClick={onClose}>×</button>
        </header>
        <div className="content">
          <div className="hint" style={{marginBottom:12}}>
            This prompt is auto-built from the video transcript + your summary. Edit it freely.
            "Save" persists it to the DB. "Copy" puts it on your clipboard so you can paste it
            into Claude or Claude Code as your next message.
          </div>
          <textarea value={prompt} onChange={e=>setPrompt(e.target.value)} />
        </div>
        <footer>
          <span className="hint">{savedPrompt === prompt ? 'Saved' : 'Unsaved changes'}</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={save}>Save to DB</button>
            <button className="btn primary" onClick={copy}><Icon name="copy"/> Copy</button>
          </div>
        </footer>
      </div>
    </div>
  );
};

const LocalCmdModal = ({ link, onClose, toast }) => {
  const cmd = buildLocalPowershell(link.url);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <header>
          <h2>Run locally</h2>
          <button className="close" onClick={onClose}>×</button>
        </header>
        <div className="content">
          <div className="hint" style={{marginBottom:12}}>
            Copy this PowerShell command, run it on your Windows box. The transcript JSON
            gets piped to your clipboard. Then click "Paste JSON result" back in the UI.
          </div>
          <textarea value={cmd} readOnly style={{minHeight:120}} />
        </div>
        <footer>
          <span className="hint">PowerShell on Windows</span>
          <button className="btn primary" onClick={()=>{ navigator.clipboard.writeText(cmd); toast('Command copied','success'); }}>
            <Icon name="copy"/> Copy command
          </button>
        </footer>
      </div>
    </div>
  );
};

const PasteJSONModal = ({ link, onClose, onSubmit, toast }) => {
  const [text, setText] = useState('');
  const [summary, setSummary] = useState('');
  const [cta, setCta] = useState('');

  const handleSubmit = async () => {
    let parsed;
    try { parsed = JSON.parse(text); } catch (e) { toast('Not valid JSON: ' + e.message, 'error'); return; }
    onSubmit(link.id, parsed, { summary, cta });
    onClose();
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <header>
          <h2>Paste transcript JSON</h2>
          <button className="close" onClick={onClose}>×</button>
        </header>
        <div className="content">
          <div className="hint" style={{marginBottom:12}}>
            Paste the JSON output from <span className="mono">transcribe.py --json</span>.
            Optionally add your own summary + CTA below.
          </div>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder='{"platform":"youtube","title":"...","transcript":"..."}' style={{minHeight:200}} />
          <div style={{display:'grid',gridTemplateColumns:'1fr',gap:10,marginTop:14}}>
            <textarea value={summary} onChange={e=>setSummary(e.target.value)} placeholder="Optional summary (3–6 sentences)…" style={{minHeight:60}} />
            <textarea value={cta} onChange={e=>setCta(e.target.value)} placeholder="Optional CTA — what to do with this in the next 24h…" style={{minHeight:60}} />
          </div>
        </div>
        <footer>
          <span className="hint">JSON only — see transcribe.py output format</span>
          <button className="btn primary" onClick={handleSubmit}>Save</button>
        </footer>
      </div>
    </div>
  );
};

const SettingsModal = ({ onClose, toast }) => {
  const [backend, setBackend] = useState(CONFIG.BACKEND_URL);
  const [openaiKey, setOpenaiKey] = useState(localStorage.getItem('vi_openai_key') || '');

  const save = () => {
    localStorage.setItem('vi_backend_url', backend);
    if (openaiKey) localStorage.setItem('vi_openai_key', openaiKey);
    else localStorage.removeItem('vi_openai_key');
    toast('Settings saved — reloading','success');
    setTimeout(()=>location.reload(), 600);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <header>
          <h2>Settings</h2>
          <button className="close" onClick={onClose}>×</button>
        </header>
        <div className="content">
          <div style={{display:'grid',gap:18}}>
            <div>
              <label style={{fontSize:12,color:'var(--txt-3)',display:'block',marginBottom:6,letterSpacing:'.1em',textTransform:'uppercase'}}>
                Backend URL (transcription service)
              </label>
              <input type="text" value={backend} onChange={e=>setBackend(e.target.value)} placeholder="https://video-intel-backend.onrender.com" style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--line-2)',color:'var(--txt)',padding:'10px 14px',borderRadius:8,fontFamily:'JetBrains Mono,monospace',fontSize:13}} />
              <div className="hint" style={{marginTop:6}}>Leave empty for local mode. Once Render is deployed, paste the service URL here.</div>
            </div>
            <div>
              <label style={{fontSize:12,color:'var(--txt-3)',display:'block',marginBottom:6,letterSpacing:'.1em',textTransform:'uppercase'}}>
                OpenAI API key (optional)
              </label>
              <input type="password" value={openaiKey} onChange={e=>setOpenaiKey(e.target.value)} placeholder="sk-..." style={{width:'100%',background:'var(--bg-2)',border:'1px solid var(--line-2)',color:'var(--txt)',padding:'10px 14px',borderRadius:8,fontFamily:'JetBrains Mono,monospace',fontSize:13}} />
              <div className="hint" style={{marginTop:6}}>Stored in your browser's localStorage only.</div>
            </div>
          </div>
        </div>
        <footer>
          <span className="hint">Settings persist per-device</span>
          <button className="btn primary" onClick={save}>Save</button>
        </footer>
      </div>
    </div>
  );
};

function App() {
  const [links, setLinks] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [activeTab, setActiveTab] = useState('all');
  const [filter, setFilter] = useState('all');
  const [busy, setBusy] = useState(false);
  const [showPrompt, setShowPrompt] = useState(null);
  const [showLocal, setShowLocal] = useState(null);
  const [showPaste, setShowPaste] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [toasts, setToasts] = useState([]);

  const toast = useCallback((msg, type) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(()=>setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  const loadLinks = useCallback(async () => {
    const { data, error } = await sb.from('vi_links').select('*').order('created_at', { ascending: false }).limit(200);
    if (error) { toast('Load failed: '+error.message,'error'); return; }
    setLinks(data || []);
  }, [toast]);

  useEffect(() => {
    loadLinks();
    const ch = sb.channel('vi_links_changes').on('postgres_changes', { event:'*', schema:'public', table:'vi_links' }, () => { loadLinks(); }).subscribe();
    return () => sb.removeChannel(ch);
  }, [loadLinks]);

  const submitUrl = async (url) => {
    setBusy(true);
    try {
      const platform = detectPlatform(url);
      const { data, error } = await sb.from('vi_links').insert({ url, platform, status: 'pending' }).select().single();
      if (error) throw error;
      setSelectedId(data.id);
      toast('Added to queue','success');
      if (CONFIG.BACKEND_URL) {
        try {
          await sb.from('vi_links').update({ status: 'processing' }).eq('id', data.id);
          const r = await fetch(CONFIG.BACKEND_URL.replace(/\/$/,'') + '/transcribe', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ id: data.id, url })
          });
          if (!r.ok) throw new Error('Backend returned ' + r.status);
        } catch (e) {
          await sb.from('vi_links').update({ status: 'failed', error: e.message }).eq('id', data.id);
          toast('Backend call failed: '+e.message,'error');
        }
      }
    } catch (e) {
      toast('Insert failed: '+e.message,'error');
    } finally {
      setBusy(false);
    }
  };

  const updateLink = async (id, patch) => {
    const { error } = await sb.from('vi_links').update(patch).eq('id', id);
    if (error) toast('Update failed: '+error.message,'error');
  };

  const deleteLink = async (id) => {
    const { error } = await sb.from('vi_links').delete().eq('id', id);
    if (error) { toast('Delete failed: '+error.message,'error'); return; }
    if (selectedId === id) setSelectedId(null);
    toast('Deleted','success');
  };

  const applyPastedJson = async (id, parsed, extras) => {
    const patch = {
      title: parsed.title,
      author: parsed.author,
      duration_sec: parsed.duration_sec,
      transcript: parsed.transcript,
      transcript_source: parsed.transcript_source,
      platform: parsed.platform || detectPlatform(parsed.url),
      video_id: parsed.video_id,
      status: 'done',
      error: null,
    };
    if (extras.summary) patch.summary = extras.summary;
    if (extras.cta) patch.call_to_action = extras.cta;
    const { error } = await sb.from('vi_links').update(patch).eq('id', id);
    if (error) { toast('Save failed: '+error.message,'error'); return; }
    toast('Result saved','success');
  };

  const visibleLinks = useMemo(() => {
    let out = links;
    if (activeTab === 'starred') out = out.filter(l => l.starred);
    if (activeTab === 'skills')  out = out.filter(l => l.skill_prompt);
    if (filter !== 'all') out = out.filter(l => l.platform === filter);
    return out;
  }, [links, activeTab, filter]);

  const selected = links.find(l => l.id === selectedId);

  return (
    <div className="app">
      <Header activeTab={activeTab} setActiveTab={setActiveTab} onSettings={()=>setShowSettings(true)} />
      <main>
        <Sidebar links={visibleLinks} selectedId={selectedId} onSelect={setSelectedId} onSubmit={submitUrl} busy={busy} filter={filter} setFilter={setFilter} />
        {selected ? (
          <Detail link={selected} onUpdate={updateLink} onDelete={deleteLink}
            onShowPrompt={(l)=>setShowPrompt(l)} onShowLocalCmd={(l)=>setShowLocal(l)}
            onPasteJSON={(l)=>setShowPaste(l)} toast={toast} />
        ) : (
          <DetailEmpty onExample={(u)=>submitUrl(u)} />
        )}
      </main>
      <footer className="foot">
        <span>Powered by <a href="https://ai-loren.com" target="_blank" rel="noreferrer">LOREN AI</a></span>
        <span>v1.0 · {links.length} {links.length===1?'video':'videos'}</span>
      </footer>
      <Toast toasts={toasts} />
      {showPrompt && <PromptModal link={showPrompt} onClose={()=>setShowPrompt(null)} toast={toast}/>}
      {showLocal && <LocalCmdModal link={showLocal} onClose={()=>setShowLocal(null)} toast={toast}/>}
      {showPaste && <PasteJSONModal link={showPaste} onClose={()=>setShowPaste(null)} onSubmit={applyPastedJson} toast={toast}/>}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} toast={toast}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
