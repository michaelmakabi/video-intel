<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Video Intel — Loren AI</title>
<meta name="description" content="Loren AI's video intelligence tool. Drop a TikTok, Reel, or YouTube link — get the transcript, an operator summary, a concrete CTA, and a one-click prompt that turns the lesson into a real Claude skill." />
<meta name="theme-color" content="#ffffff" />
<meta property="og:title" content="Video Intel — Loren AI" />
<meta property="og:description" content="Drop a video link. Get a real skill." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://video-intel.ai-loren.com" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%2334C4C4'/><path d='M22 18 L22 46 L42 46 M22 32 L42 32' stroke='%23ffffff' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* =========================================================================
     LOREN AI BRAND SYSTEM (pulled directly from michaelmakabi/Loren_AI repo)
     ========================================================================= */
  :root{
    --bg:hsl(0 0% 100%);
    --bg-soft:hsl(210 20% 98%);
    --bg-2:hsl(220 14% 96%);
    --surface:hsl(0 0% 100%);
    --line:hsl(220 14% 92%);
    --line-2:hsl(220 14% 86%);
    --txt:hsl(0 0% 0%);
    --txt-2:hsl(215 16% 47%);
    --txt-3:hsl(215 16% 65%);
    --txt-faint:hsl(215 16% 80%);

    --teal:hsl(178 68% 45%);
    --teal-mid:hsl(178 68% 55%);
    --teal-bright:hsl(178 68% 65%);
    --teal-soft:hsl(178 68% 96%);
    --teal-glow:hsl(178 68% 55% / 0.18);

    --green:hsl(142 71% 38%);
    --red:hsl(0 78% 55%);
    --warning:hsl(38 92% 50%);

    --shadow-sm:0 1px 2px hsl(0 0% 0% / 0.04);
    --shadow:0 4px 16px hsl(0 0% 0% / 0.06), 0 1px 3px hsl(0 0% 0% / 0.04);
    --shadow-lg:0 12px 32px hsl(0 0% 0% / 0.10);
    --shadow-teal:0 8px 32px hsl(178 68% 55% / 0.18);

    --gradient-teal:linear-gradient(135deg, hsl(178 68% 45%), hsl(178 68% 65%));
    --gradient-bg:linear-gradient(180deg, hsl(0 0% 100%), hsl(210 20% 98%));

    --radius:0.75rem;
    --radius-sm:0.5rem;
    --radius-lg:1rem;

    --inter:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:var(--inter);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{min-height:100vh}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:var(--teal-mid)}
  button{font-family:var(--inter)}

  /* =========================================================================
     APP SHELL
     ========================================================================= */
  .app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}

  /* =========================================================================
     HEADER (Loren AI brand bar)
     ========================================================================= */
  header.bar{
    position:sticky;top:0;z-index:50;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 28px;
    background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}
  .brand .logo{
    width:36px;height:36px;border-radius:9px;
    background:var(--gradient-teal);
    display:grid;place-items:center;
    box-shadow:var(--shadow-teal);
  }
  .brand .logo svg{width:18px;height:18px;color:#fff}
  .brand .name{display:flex;flex-direction:column;line-height:1.15}
  .brand .name .top{font-weight:700;font-size:15px;letter-spacing:-0.01em}
  .brand .name .top span{color:var(--teal-mid)}
  .brand .name .bottom{font-size:10.5px;color:var(--txt-3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:2px}

  nav.menu{display:flex;align-items:center;gap:4px}
  nav.menu button{
    color:var(--txt-2);background:transparent;border:none;
    font-size:13.5px;font-weight:500;padding:8px 14px;border-radius:7px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;transition:all .15s;
  }
  nav.menu button:hover{color:var(--txt);background:var(--bg-2)}
  nav.menu button.active{color:var(--teal);background:var(--teal-soft)}
  nav.menu button svg{width:14px;height:14px}
  nav.menu .divider{width:1px;height:20px;background:var(--line);margin:0 6px}

  /* =========================================================================
     MAIN CONTAINER
     ========================================================================= */
  main{padding:32px 28px;max-width:1280px;margin:0 auto;width:100%}
  @media(max-width:700px){main{padding:20px 16px}}

  /* =========================================================================
     WIZARD
     ========================================================================= */
  .wizard{max-width:780px;margin:0 auto}
  .stepper{
    display:flex;align-items:center;gap:0;padding:18px 24px;
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-sm);margin-bottom:24px;
  }
  .step-item{display:flex;align-items:center;gap:10px;flex:1}
  .step-num{
    flex-shrink:0;width:30px;height:30px;border-radius:50%;
    display:grid;place-items:center;font-weight:600;font-size:13px;
    background:var(--bg-2);color:var(--txt-3);border:2px solid var(--line);transition:all .25s;
  }
  .step-item.done .step-num{background:var(--teal);color:#fff;border-color:var(--teal)}
  .step-item.active .step-num{background:var(--gradient-teal);color:#fff;border-color:var(--teal-bright);box-shadow:0 0 0 4px var(--teal-glow)}
  .step-label{font-size:13px;font-weight:500;color:var(--txt-3);transition:color .2s}
  .step-item.done .step-label,.step-item.active .step-label{color:var(--txt)}
  .step-line{flex:1;height:2px;background:var(--line);margin:0 8px;transition:background .25s}
  .step-item.done + .step-line{background:var(--teal)}
  @media(max-width:640px){.step-label{display:none}}

  .step-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:40px;box-shadow:var(--shadow);
  }
  @media(max-width:640px){.step-card{padding:28px 22px}}
  .step-card .eyebrow{
    font-size:11px;color:var(--teal);font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px;
  }
  .step-card h1{
    font-family:var(--inter);font-size:32px;font-weight:700;letter-spacing:-0.025em;line-height:1.15;margin:0 0 12px;color:var(--txt);
  }
  .step-card h1 em{color:var(--teal);font-style:normal;font-weight:700}
  .step-card .lede{font-size:15.5px;line-height:1.65;color:var(--txt-2);margin:0 0 28px;max-width:560px}

  .url-input-wrap{
    display:flex;gap:10px;padding:8px;
    background:var(--bg-soft);border:1px solid var(--line-2);border-radius:var(--radius);
    transition:all .15s;
  }
  .url-input-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-glow);background:var(--surface)}
  .url-input-wrap input{
    flex:1;background:transparent;border:none;outline:none;
    padding:12px 14px;font-family:var(--mono);font-size:14px;color:var(--txt);
  }
  .url-input-wrap input::placeholder{color:var(--txt-faint)}
  .btn-primary{
    background:var(--gradient-teal);color:#fff;border:none;
    padding:12px 22px;border-radius:8px;font-weight:600;font-size:14px;letter-spacing:-0.005em;cursor:pointer;
    box-shadow:var(--shadow-teal);transition:all .2s;display:inline-flex;align-items:center;gap:7px;
  }
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px hsl(178 68% 55% / 0.3)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

  .platform-detect{
    margin-top:18px;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--txt-3);
  }
  .platform-pill{
    display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;letter-spacing:.05em;
  }
  .pp-youtube{background:#fdebec;color:#c4334b}
  .pp-tiktok{background:#e6f4f8;color:#236f87}
  .pp-instagram{background:#fbe9f4;color:#a4448a}
  .pp-other{background:var(--bg-2);color:var(--txt-3)}

  .recent-strip{
    margin-top:32px;padding-top:24px;border-top:1px dashed var(--line);
  }
  .recent-strip .label{font-size:11px;color:var(--txt-3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:12px}
  .recent-strip .items{display:flex;flex-wrap:wrap;gap:8px}
  .recent-chip{
    display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg-soft);border:1px solid var(--line);
    border-radius:99px;font-size:12.5px;color:var(--txt-2);cursor:pointer;transition:all .15s;max-width:280px;
  }
  .recent-chip:hover{border-color:var(--teal-mid);background:var(--teal-soft)}
  .recent-chip span.t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Step 2: progress */
  .progress-stages{display:flex;flex-direction:column;gap:14px;margin:24px 0}
  .pstage{
    display:flex;align-items:center;gap:14px;padding:16px 20px;
    background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);transition:all .25s;
  }
  .pstage.active{background:var(--teal-soft);border-color:var(--teal)}
  .pstage.done{background:var(--surface);border-color:var(--line)}
  .pstage .icon{
    flex-shrink:0;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;
    background:var(--bg-2);color:var(--txt-3);
  }
  .pstage.active .icon{background:var(--gradient-teal);color:#fff}
  .pstage.done .icon{background:var(--green);color:#fff}
  .pstage .body{flex:1}
  .pstage .body .ttl{font-weight:600;font-size:14px;color:var(--txt)}
  .pstage .body .sub{font-size:12.5px;color:var(--txt-3);margin-top:2px}
  .pstage.failed{background:#fbe9e9;border-color:var(--red)}
  .pstage.failed .icon{background:var(--red);color:#fff}

  /* =========================================================================
     STEP 3 — REVIEW (also used for library detail)
     ========================================================================= */
  .review-card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;
  }
  .review-head{
    padding:32px 40px 0;
  }
  @media(max-width:640px){.review-head{padding:24px 22px 0}}
  .review-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--txt-3);margin-bottom:14px}
  .review-meta .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .d-pending{background:var(--warning);animation:pulse 1.5s infinite}
  .d-processing{background:var(--teal);animation:pulse 1.2s infinite}
  .d-done{background:var(--green)}
  .d-failed{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .review-meta .author{color:var(--txt-2)}
  .review-title{
    font-family:var(--inter);font-size:30px;font-weight:700;letter-spacing:-0.025em;line-height:1.2;
    margin:0 0 10px;color:var(--txt);
  }
  .review-sub{display:flex;flex-wrap:wrap;gap:14px;color:var(--txt-3);font-size:13px;align-items:center;margin-bottom:24px}
  .review-sub a{color:var(--txt-2);text-decoration:none;border-bottom:1px solid var(--line-2);transition:all .15s}
  .review-sub a:hover{color:var(--teal);border-color:var(--teal)}
  .review-sub .sep{color:var(--line-2)}

  .review-actions{
    display:flex;flex-wrap:wrap;gap:8px;padding:0 40px 24px;border-bottom:1px solid var(--line);
  }
  @media(max-width:640px){.review-actions{padding:0 22px 20px}}
  .btn{
    display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);color:var(--txt);
    padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;text-decoration:none;
  }
  .btn:hover{border-color:var(--teal-mid);color:var(--teal);background:var(--teal-soft)}
  .btn.primary{background:var(--gradient-teal);color:#fff;border-color:var(--teal-mid);font-weight:600;box-shadow:var(--shadow-teal)}
  .btn.primary:hover{color:#fff;transform:translateY(-1px);box-shadow:0 12px 32px hsl(178 68% 55% / 0.3)}
  .btn.danger:hover{border-color:var(--red);color:var(--red);background:#fbe9e9}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn.ghost:hover{background:var(--bg-2);border-color:var(--line)}
  .btn-back{
    background:transparent;border:none;color:var(--txt-2);font-size:13.5px;font-weight:500;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:6px;transition:all .15s;
  }
  .btn-back:hover{background:var(--bg-2);color:var(--txt)}

  .review-body{padding:32px 40px}
  @media(max-width:640px){.review-body{padding:24px 22px}}
  .section{margin-bottom:32px}
  .section:last-child{margin-bottom:0}
  .section h3{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:700;margin:0 0 12px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .section .body{font-size:15px;line-height:1.7;color:var(--txt)}
  .section ul{margin:0;padding:0 0 0 20px}
  .section li{margin-bottom:8px;line-height:1.6}
  .section li::marker{color:var(--teal)}

  .cta-card{
    background:var(--gradient-teal);border-radius:var(--radius-lg);padding:24px 26px;color:#fff;
    box-shadow:var(--shadow-teal);
  }
  .cta-card .label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:10px;opacity:.85}
  .cta-card .text{font-size:16.5px;line-height:1.55;font-weight:500}

  .transcript{
    background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;
    font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--txt-2);
    max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word;
  }
  .transcript-meta{font-size:11px;color:var(--txt-3);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

  .verify-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .verify-row:last-child{border-bottom:none}
  .verify-status{
    flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
    padding:3px 9px;border-radius:99px;
  }
  .vs-verified{background:#e3f5e8;color:var(--green)}
  .vs-unverified{background:#fdf4e0;color:var(--warning)}
  .vs-contradicted{background:#fbe9e9;color:var(--red)}

  /* =========================================================================
     LIBRARY VIEW
     ========================================================================= */
  .lib-head{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:18px;flex-wrap:wrap;
  }
  .lib-head h1{
    font-family:var(--inter);font-size:28px;font-weight:700;letter-spacing:-0.025em;margin:0;
  }
  .lib-head .count{font-size:13px;color:var(--txt-3);margin-left:8px;font-weight:500}

  .search-bar{
    position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:8px 8px 8px 16px;display:flex;align-items:center;gap:10px;
    box-shadow:var(--shadow-sm);transition:all .15s;margin-bottom:18px;
  }
  .search-bar:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-glow)}
  .search-bar svg{flex-shrink:0;color:var(--txt-3);width:16px;height:16px}
  .search-bar input{
    flex:1;background:transparent;border:none;outline:none;
    font-size:14px;color:var(--txt);font-family:var(--inter);padding:8px 0;
  }
  .search-bar input::placeholder{color:var(--txt-3)}
  .search-bar kbd{
    font-size:11px;color:var(--txt-3);background:var(--bg-2);border:1px solid var(--line);
    padding:3px 6px;border-radius:4px;font-family:var(--mono);
  }
  .search-bar .clear{
    background:transparent;border:none;color:var(--txt-3);cursor:pointer;padding:6px 10px;border-radius:6px;font-size:12px;
  }
  .search-bar .clear:hover{background:var(--bg-2);color:var(--txt)}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
  .filters .chip{
    background:var(--surface);border:1px solid var(--line);color:var(--txt-2);
    padding:6px 13px;border-radius:99px;font-size:12.5px;cursor:pointer;font-weight:500;transition:all .15s;
  }
  .filters .chip.active{background:var(--txt);color:#fff;border-color:var(--txt)}
  .filters .chip:hover:not(.active){border-color:var(--teal-mid);color:var(--teal)}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;
  }
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    cursor:pointer;transition:all .15s;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--teal-mid)}
  .card-top{padding:18px 20px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card-platform{display:flex;align-items:center;gap:8px}
  .card-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .card-title{
    padding:0 20px;font-size:15.5px;font-weight:600;letter-spacing:-0.01em;line-height:1.4;color:var(--txt);
    margin:0 0 8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .card-author{padding:0 20px;font-size:12.5px;color:var(--txt-3);margin-bottom:14px}
  .card-summary{
    padding:0 20px 16px;font-size:13px;color:var(--txt-2);line-height:1.55;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;
  }
  .card-foot{
    padding:12px 20px;border-top:1px solid var(--line);background:var(--bg-soft);
    display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--txt-3);
  }
  .card-foot .badges{display:flex;gap:6px}
  .card-foot .badge{
    padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  }
  .badge-skill{background:var(--teal-soft);color:var(--teal)}
  .badge-star{background:#fef4e0;color:var(--warning)}

  .empty-grid{
    grid-column:1/-1;text-align:center;padding:60px 24px;color:var(--txt-3);
    background:var(--bg-soft);border:1px dashed var(--line-2);border-radius:var(--radius-lg);
  }
  .empty-grid h3{font-family:var(--inter);font-size:18px;color:var(--txt-2);font-weight:600;margin:0 0 8px}
  .empty-grid p{font-size:14px;line-height:1.5;margin:0}

  /* =========================================================================
     MODAL
     ========================================================================= */
  .modal-bg{
    position:fixed;inset:0;background:hsl(0 0% 0% / 0.4);z-index:100;
    display:grid;place-items:center;padding:20px;backdrop-filter:blur(6px);
  }
  .modal{
    background:var(--surface);border-radius:var(--radius-lg);
    max-width:820px;width:100%;max-height:90vh;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:var(--shadow-lg);
  }
  .modal-head{padding:20px 26px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head h2{margin:0;font-family:var(--inter);font-size:18px;font-weight:700;color:var(--txt);letter-spacing:-0.01em}
  .modal-head .close{background:transparent;border:none;color:var(--txt-3);font-size:22px;cursor:pointer;padding:4px 10px;border-radius:6px;line-height:1}
  .modal-head .close:hover{color:var(--txt);background:var(--bg-2)}
  .modal-content{padding:24px 26px;overflow:auto;flex:1}
  .modal-content textarea{
    width:100%;background:var(--bg-soft);border:1px solid var(--line-2);color:var(--txt);
    border-radius:8px;padding:14px;font-family:var(--mono);font-size:12.5px;line-height:1.6;resize:vertical;outline:none;
  }
  .modal-content textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);background:var(--surface)}
  .modal-content textarea.tall{min-height:380px}
  .modal-foot{
    padding:14px 26px;border-top:1px solid var(--line);background:var(--bg-soft);
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .hint{font-size:12px;color:var(--txt-3);line-height:1.55}

  /* =========================================================================
     FOOTER
     ========================================================================= */
  footer.foot{
    padding:20px 28px;border-top:1px solid var(--line);background:var(--bg-soft);
    display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--txt-3);
  }
  footer.foot a{color:var(--teal);text-decoration:none;font-weight:600}
  footer.foot a:hover{text-decoration:underline}

  /* =========================================================================
     TOAST
     ========================================================================= */
  .toast-wrap{position:fixed;top:80px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200}
  .toast{
    background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--teal);
    color:var(--txt);padding:12px 18px;border-radius:8px;font-size:13px;
    box-shadow:var(--shadow-lg);min-width:260px;animation:slideIn .25s;
  }
  .toast.error{border-left-color:var(--red)}
  .toast.success{border-left-color:var(--green)}
  @keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* =========================================================================
     SPINNER
     ========================================================================= */
  .spinner{
    display:inline-block;width:14px;height:14px;border:2px solid var(--line-2);border-top-color:var(--teal);
    border-radius:50%;animation:spin .8s linear infinite;
  }
  .spinner.lg{width:24px;height:24px;border-width:3px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* =========================================================================
     SETTINGS PANEL
     ========================================================================= */
  .settings-row{display:grid;gap:18px}
  .settings-row label{font-size:11px;color:var(--txt-3);display:block;margin-bottom:6px;letter-spacing:.16em;text-transform:uppercase;font-weight:600}
  .settings-row input{
    width:100%;background:var(--bg-soft);border:1px solid var(--line-2);color:var(--txt);
    padding:10px 14px;border-radius:8px;font-family:var(--mono);font-size:13px;outline:none;
  }
  .settings-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow);background:var(--surface)}

  /* =========================================================================
     UTILS
     ========================================================================= */
  .hide-mobile{}
  @media(max-width:640px){.hide-mobile{display:none}}
  .text-mono{font-family:var(--mono)}
  .text-muted{color:var(--txt-2)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useMemo, useCallback, useRef } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';

// ============================================================================
// CONFIG
// ============================================================================
const CONFIG = {
  SUPABASE_URL: 'https://vaerkevjrupxdbgrxfkk.supabase.co',
  SUPABASE_ANON_KEY: 'sb_publishable_elUUmJXjGMXfJ8RBhZkBvA_yTeSjXR_',
  BACKEND_URL: localStorage.getItem('vi_backend_url') ?? 'https://loren-video-intel.fly.dev',
};

const sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// ============================================================================
// HELPERS
// ============================================================================
const detectPlatform = (url) => {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('tiktok.com')) return 'tiktok';
  if (u.includes('instagram.com')) return 'instagram';
  return 'other';
};

const platformLabel = (p) => ({youtube:'YOUTUBE',tiktok:'TIKTOK',instagram:'INSTAGRAM',other:'OTHER'}[p] || 'OTHER');
const platformShort = (p) => ({youtube:'YT',tiktok:'TT',instagram:'IG',other:'?'}[p] || '?');

const fmtRelative = (iso) => {
  if (!iso) return '';
  const t = new Date(iso).getTime();
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
};

const fmtDuration = (sec) => {
  if (!sec) return '';
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
};

const buildSkillPrompt = (link) => {
  const dt = new Date().toISOString().slice(0,10);
  return `# New Skill Request - generated by Video Intel on ${dt}

## Source video
- Platform: ${link.platform || 'unknown'}
- URL: ${link.url}
- Title: ${link.title || '(untitled)'}
- Author: ${link.author || '(unknown)'}
- Duration: ${link.duration_sec || '?'}s

## What the video taught
${link.summary || '(no summary captured)'}

${(link.key_points && link.key_points.length) ? '## Key points\n' + link.key_points.map(k => '- ' + k).join('\n') + '\n' : ''}
## Skill concept
${link.skill_description || '(describe the skill in one sentence)'}

## Build instructions for Claude / Claude Code

Please build a new skill in my Makabi Agent OS based on this video lesson.

1. Read \`~/.claude/skills/skill-creator/SKILL.md\` first so you follow the standard skill format.
2. Create a new skill folder: \`~/.claude/skills/<short-kebab-name>/\` with:
   - \`SKILL.md\` - name, description (with trigger phrases), full instructions in operator voice
   - \`scripts/\` - any helper scripts (Python preferred, Node OK) that automate the workflow
   - \`references/\` - supporting docs (setup notes, examples)
3. Trigger phrases must be specific to what Master Makabi would actually say when this situation comes up - not generic.
4. Tie the skill's outputs concretely to one or more of: BRiX, Loren AI, 1PM AI, MTIP, BroadBridge.
5. Register the skill in the manifest, run the smoke test, confirm \`list_skills\` surfaces it.
6. Source transcript follows below - use it as ground truth for what the video actually said.

---
## TRANSCRIPT (verbatim)
${link.transcript || '(no transcript)'}
---

Sign off as "Mike" if you write any test artifacts.`;
};

// ============================================================================
// ICONS (inline SVG)
// ============================================================================
const I = {
  search: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 5v14M5 12h14"/></svg>,
  library: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M2 6h4v15H2zM18 6h4v15h-4zM6 21V3h4v18zM10 3h4v18h-4zM14 21V8h4v13z"/></svg>,
  settings: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
  star: (p) => <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  starOff: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
  copy: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
  trash: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="3 6 5 6 21 6"/><path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>,
  sparkles: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>,
  ext: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  back: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
  next: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  check: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
  x: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="6"/></svg>,
  refresh: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
};

// ============================================================================
// HEADER (with Loren AI brand)
// ============================================================================
const LogoMark = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M5 4 L5 20 L12 20"/>
    <path d="M5 12 L12 12"/>
    <circle cx="17" cy="9" r="2" fill="currentColor" stroke="none"/>
    <path d="M17 11 L17 20"/>
  </svg>
);

const Header = ({ view, setView, onSettings, count }) => (
  <header className="bar">
    <a className="brand" href="https://ai-loren.com" target="_blank" rel="noreferrer">
      <div className="logo"><LogoMark/></div>
      <div className="name">
        <div className="top"><span>loren</span> AI</div>
        <div className="bottom">Video Intel</div>
      </div>
    </a>
    <nav className="menu">
      <button className={view==='wizard'?'active':''} onClick={()=>setView('wizard')}>
        <I.plus/> <span className="hide-mobile">New</span>

      <button className={view==='library'?'active':''} onClick={()=>setView('library')}>
        <I.library/> <span className="hide-mobile">Library</span>{count>0 && <span style={{fontSize:11,color:'var(--txt-3)'}}>· {count}</span>}
      </button>
      <span className="divider"/>
      <button onClick={onSettings}>
        <I.settings/>
      </button>
    </nav>
  </header>
);

// ============================================================================
// STEPPER
// ============================================================================
const STEPS = [
  { id: 1, label: 'Add' },
  { id: 2, label: 'Transcribe' },
  { id: 3, label: 'Review' },
];

const Stepper = ({ current }) => (
  <div className="stepper">
    {STEPS.map((s, i) => (
      <React.Fragment key={s.id}>
        <div className={'step-item ' + (current===s.id?'active':current>s.id?'done':'')}>
          <div className="step-num">{current>s.id ? <I.check/> : s.id}</div>
          <div className="step-label">{s.label}</div>
        </div>
        {i < STEPS.length - 1 && <div className={'step-line ' + (current>s.id?'done':'')}/>}
      </React.Fragment>
    ))}
  </div>
);

// ============================================================================
// STEP 1: ADD VIDEO
// ============================================================================
const StepAdd = ({ onSubmit, busy, recent, onPickRecent }) => {
  const [val, setVal] = useState('');
  const platform = detectPlatform(val);

  const submit = (e) => {
    e?.preventDefault();
    const v = val.trim();
    if (!v) return;
    onSubmit(v);
  };

  return (
    <div className="step-card">
      <div className="eyebrow">Step 1 of 3</div>
      <h1>Drop a <em>video link</em></h1>
      <p className="lede">
        Paste any TikTok, Instagram Reel, or YouTube URL below. We'll pull the
        transcript, distill the lesson, and prep a Claude-ready skill prompt
        you can ship in one click.
      </p>

      <form className="url-input-wrap" onSubmit={submit}>
        <input
          type="text"
          value={val}
          onChange={e=>setVal(e.target.value)}
          placeholder="https://www.tiktok.com/@user/video/..."
          autoFocus
          disabled={busy}
        />
        <button type="submit" className="btn-primary" disabled={busy || !val.trim()}>
          {busy ? <span className="spinner"/> : <><I.next/> Process</>}
        </button>
      </form>

      {val.trim() && (
        <div className="platform-detect">
          <span>Detected:</span>
          <span className={'platform-pill pp-' + platform}>{platformLabel(platform)}</span>
        </div>
      )}

      {recent && recent.length > 0 && (
        <div className="recent-strip">
          <div className="label">Recent</div>
          <div className="items">
            {recent.slice(0,5).map(l => (
              <button key={l.id} className="recent-chip" onClick={()=>onPickRecent(l)}>
                <span className={'platform-pill pp-' + (l.platform||'other')} style={{padding:'2px 7px',fontSize:10}}>{platformShort(l.platform)}</span>
                <span className="t">{l.title || l.url}</span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ============================================================================
// STEP 2: TRANSCRIBE PROGRESS
// ============================================================================
const StepProgress = ({ link, onContinue, onBack }) => {
  const status = link?.status || 'pending';
  const isDone = status === 'done';
  const isFailed = status === 'failed';
  const hasTranscript = !!link?.transcript;

  return (
    <div className="step-card">
      <div className="eyebrow">Step 2 of 3</div>
      <h1>Working on <em>{link?.title || 'your video'}</em></h1>
      <p className="lede">
        Backend is pulling the transcript and generating a structured summary.
        This usually takes 5–30 seconds.
      </p>

      <div className="progress-stages">
        <div className={'pstage ' + (isDone || hasTranscript ? 'done' : (status==='processing'?'active':'active'))}>
          <div className="icon">
            {isDone || hasTranscript ? <I.check/> : <span className="spinner"/>}
          </div>
          <div className="body">
            <div className="ttl">Transcribe</div>
            <div className="sub">{
              isFailed ? 'Failed' :
              hasTranscript ? `Done — ${link.transcript_source || 'captions'}` :
              'Pulling captions or running Whisper / ElevenLabs…'
            }</div>
          </div>
        </div>

        <div className={'pstage ' + (isDone ? 'done' : (hasTranscript ? 'active' : ''))}>
          <div className="icon">
            {isDone ? <I.check/> : (hasTranscript ? <span className="spinner"/> : '·')}
          </div>
          <div className="body">
            <div className="ttl">Synthesize</div>
            <div className="sub">{
              isDone ? 'Done — summary, key points, CTA generated' :
              hasTranscript ? 'Claude is writing the operator summary…' :
              'Waiting…'
            }</div>
          </div>
        </div>

        <div className={'pstage ' + (isDone ? 'done' : '')}>
          <div className="icon">{isDone ? <I.check/> : '·'}</div>
          <div className="body">
            <div className="ttl">Save</div>
            <div className="sub">{isDone ? 'Saved to your Library' : 'Will save when synthesis completes'}</div>
          </div>
        </div>

        {isFailed && (
          <div className="pstage failed">
            <div className="icon"><I.x/></div>
            <div className="body">
              <div className="ttl">Pipeline failed</div>
              <div className="sub" style={{color:'var(--red)',fontFamily:'var(--mono)',fontSize:11}}>{link?.error}</div>
            </div>
          </div>
        )}
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:24}}>
        <button className="btn-back" onClick={onBack}><I.back/> New video</button>
        {(isDone || isFailed) && (
          <button className="btn-primary" onClick={onContinue}>
            {isDone ? <>Review <I.next/></> : <>Try another <I.refresh/></>}
          </button>
        )}
      </div>
    </div>
  );
};

// ============================================================================
// STEP 3: REVIEW (also used as detail view from library)
// ============================================================================
const ReviewBody = ({ link, onUpdate, onDelete, onSkillPrompt, onBack, onNew, toast, isLibrary }) => {
  if (!link) return null;
  const isDone = link.status === 'done';
  const isFailed = link.status === 'failed';
  const isPending = link.status === 'pending' || link.status === 'processing';

  const copyText = (text, label) => {
    navigator.clipboard.writeText(text);
    toast(label + ' copied','success');
  };

  return (
    <div className="review-card">
      <div className="review-head">
        {!isLibrary && <div className="eyebrow">Step 3 of 3</div>}
        <div className="review-meta">
          <span className={'platform-pill pp-' + (link.platform||'other')}>{platformLabel(link.platform)}</span>
          <span className={'dot d-' + (link.status||'pending')}/>
          <span style={{textTransform:'capitalize'}}>{link.status}</span>
          {link.starred && <><span style={{color:'var(--line-2)'}}>·</span><span style={{color:'var(--warning)'}}>★ Starred</span></>}
          {link.skill_prompt && <><span style={{color:'var(--line-2)'}}>·</span><span style={{color:'var(--teal)'}}>Skill drafted</span></>}
        </div>
        <h1 className="review-title">{link.title || '(untitled)'}</h1>
        <div className="review-sub">
          {link.author && <span className="author">{link.author}</span>}
          {link.duration_sec ? <><span className="sep">·</span><span>{fmtDuration(link.duration_sec)}</span></> : null}
          <span className="sep">·</span>
          <span>{fmtRelative(link.created_at)}</span>
          <span className="sep">·</span>
          <a href={link.url} target="_blank" rel="noreferrer">view source <I.ext style={{width:11,height:11,display:'inline'}}/></a>
        </div>
      </div>

      <div className="review-actions">
        {isLibrary && <button className="btn-back" onClick={onBack} style={{marginRight:'auto'}}><I.back/> Library</button>}
        <button className="btn" onClick={()=>onUpdate(link.id, {starred: !link.starred})}>
          <I.star/> {link.starred ? 'Unstar' : 'Star'}
        </button>
        {isDone && (
          <button className="btn primary" onClick={()=>onSkillPrompt(link)}>
            <I.sparkles/> Skill prompt
          </button>
        )}
        <button className="btn danger" onClick={()=>{
          if (confirm('Delete this entry?')) onDelete(link.id);
        }}>
          <I.trash/> Delete
        </button>
        {!isLibrary && isDone && (
          <button className="btn-primary" style={{marginLeft:'auto'}} onClick={onNew}>
            <I.plus/> Add another
          </button>
        )}
      </div>

      <div className="review-body">
        {isPending && !link.transcript && (
          <div className="section">
            <div className="body" style={{color:'var(--txt-3)',padding:'18px 0',display:'flex',alignItems:'center',gap:12}}>
              <span className="spinner lg"/>
              Transcription in progress…
            </div>
          </div>
        )}

        {isFailed && link.error && (
          <div className="section">
            <h3>Error</h3>
            <div className="body" style={{color:'var(--red)',background:'#fbe9e9',padding:14,borderRadius:8,border:'1px solid #f0c4c4',fontFamily:'var(--mono)',fontSize:13}}>
              {link.error}
            </div>
          </div>
        )}

        {link.summary && (
          <div className="section">
            <h3>Summary</h3>
            <div className="body">{link.summary}</div>
          </div>
        )}

        {link.key_points && link.key_points.length > 0 && (
          <div className="section">
            <h3>Key Points</h3>
            <ul className="body">
              {link.key_points.map((k,i)=><li key={i}>{k}</li>)}
            </ul>
          </div>
        )}

        {link.verification && link.verification.length > 0 && (
          <div className="section">
            <h3>Verification</h3>
            <div>
              {link.verification.map((v,i)=>(
                <div key={i} className="verify-row">
                  <span className={'verify-status vs-'+(v.status||'unverified')}>{v.status||'?'}</span>
                  <div style={{flex:1}}>
                    <div style={{color:'var(--txt)'}}>{v.claim}</div>
                    {v.note && <div style={{color:'var(--txt-3)',fontSize:12,marginTop:3}}>{v.note}</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {link.call_to_action && (
          <div className="section">
            <div className="cta-card">
              <div className="label">Call to action · next 24h</div>
              <div className="text">{link.call_to_action}</div>
            </div>
          </div>
        )}

        {link.transcript && (
          <div className="section">
            <h3>
              <span>Transcript</span>
              <button className="btn ghost" style={{fontSize:11,padding:'4px 10px'}} onClick={()=>copyText(link.transcript,'Transcript')}>
                <I.copy/> copy
              </button>
            </h3>
            <div className="transcript-meta">
              <span>source: {link.transcript_source || 'unknown'}</span>
              <span>{link.transcript.length.toLocaleString()} chars</span>
            </div>
            <div className="transcript">{link.transcript}</div>
          </div>
        )}
      </div>
    </div>
  );
};

// ============================================================================
// LIBRARY (search + filter grid)
// ============================================================================
const Library = ({ links, onOpen, onSearch, search, setSearch, filter, setFilter, hasSearch, loading }) => {
  const searchRef = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchRef.current?.focus();
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  return (
    <div>
      <div className="lib-head">
        <h1>Library<span className="count">{links.length} {links.length===1?'video':'videos'}</span></h1>
      </div>

      <div className="search-bar">
        <I.search/>
        <input
          ref={searchRef}
          type="text"
          placeholder="Search across titles, transcripts, summaries, key points, CTAs…"
          value={search}
          onChange={e=>setSearch(e.target.value)}
        />
        {search && <button className="clear" onClick={()=>setSearch('')}>clear</button>}
        {!search && <kbd>⌘K</kbd>}
      </div>

      <div className="filters">
        {[
          {id:'all',label:'All'},
          {id:'youtube',label:'YouTube'},
          {id:'tiktok',label:'TikTok'},
          {id:'instagram',label:'Instagram'},
          {id:'starred',label:'★ Starred'},
          {id:'skills',label:'Skill drafts'},
          {id:'failed',label:'Failed'},
        ].map(f => (
          <button key={f.id} className={'chip ' + (filter===f.id?'active':'')} onClick={()=>setFilter(f.id)}>{f.label}</button>
        ))}
      </div>

      {loading ? (
        <div className="empty-grid">
          <div className="spinner lg" style={{marginBottom:14}}/>
          <p>Searching…</p>
        </div>
      ) : (
        <div className="grid">
          {links.length === 0 ? (
            <div className="empty-grid">
              <h3>{hasSearch ? 'Nothing matches' : 'Library is empty'}</h3>
              <p>{hasSearch ? 'Try a different search term or clear filters.' : 'Add your first video from the New tab to start building a knowledge base.'}</p>
            </div>
          ) : (
            links.map(l => (
              <div key={l.id} className="card" onClick={()=>onOpen(l)}>
                <div className="card-top">
                  <div className="card-platform">
                    <span className={'platform-pill pp-' + (l.platform||'other')}>{platformLabel(l.platform)}</span>
                  </div>
                  <div className="card-status">
                    <span className={'dot d-' + (l.status||'pending')}/>
                    {l.status}
                  </div>
                </div>
                <h3 className="card-title">{l.title || l.url}</h3>
                <div className="card-author">{l.author || '—'} · {fmtRelative(l.created_at)}</div>
                <div className="card-summary">{l.summary || (l.status === 'failed' ? l.error : 'Processing…')}</div>
                <div className="card-foot">
                  <span>{l.duration_sec ? fmtDuration(l.duration_sec) : ''}</span>
                  <div className="badges">
                    {l.starred && <span className="badge badge-star">★ Star</span>}
                    {l.skill_prompt && <span className="badge badge-skill">Skill</span>}
                  </div>
                </div>
              </div>
            ))
          )}
        </div>
      )}
    </div>
  );
};

// ============================================================================
// MODALS
// ============================================================================
const PromptModal = ({ link, onClose, toast }) => {
  const [prompt, setPrompt] = useState(buildSkillPrompt(link));
  const [savedPrompt, setSavedPrompt] = useState(link.skill_prompt);

  const save = async () => {
    const { error } = await sb.from('vi_links').update({ skill_prompt: prompt, skill_candidate: true }).eq('id', link.id);
    if (error) { toast('Save failed: ' + error.message, 'error'); return; }
    setSavedPrompt(prompt);
    toast('Prompt saved', 'success');
  };

  const copy = () => {
    navigator.clipboard.writeText(prompt);
    toast('Prompt copied — paste into Claude or Claude Code', 'success');
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Skill prompt — paste into Claude</h2>
          <button className="close" onClick={onClose}><I.x/></button>
        </div>
        <div className="modal-content">
          <div className="hint" style={{marginBottom:12}}>
            Auto-built from the video transcript + summary. Edit freely. <b>Save</b> persists it to your Library; <b>Copy</b> puts it on your clipboard for Claude.
          </div>
          <textarea className="tall" value={prompt} onChange={e=>setPrompt(e.target.value)}/>
        </div>
        <div className="modal-foot">
          <span className="hint">{savedPrompt === prompt ? 'Saved' : 'Unsaved changes'}</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn" onClick={save}>Save</button>
            <button className="btn primary" onClick={copy}><I.copy/> Copy</button>
          </div>
        </div>
      </div>
    </div>
  );
};

const SettingsModal = ({ onClose, toast }) => {
  const [backend, setBackend] = useState(localStorage.getItem('vi_backend_url') ?? '');

  const save = () => {
    if (backend) localStorage.setItem('vi_backend_url', backend);
    else localStorage.removeItem('vi_backend_url');
    toast('Settings saved — reloading','success');
    setTimeout(()=>location.reload(), 600);
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Settings</h2>
          <button className="close" onClick={onClose}><I.x/></button>
        </div>
        <div className="modal-content">
          <div className="settings-row">
            <div>
              <label>Backend URL override</label>
              <input
                type="text"
                value={backend}
                onChange={e=>setBackend(e.target.value)}
                placeholder="https://loren-video-intel.fly.dev (default)"
              />
              <div className="hint" style={{marginTop:6}}>Leave empty to use the default Fly.io backend.</div>
            </div>
            <div className="hint" style={{padding:14,background:'var(--bg-soft)',borderRadius:8,border:'1px solid var(--line)'}}>
              <b style={{color:'var(--txt)'}}>Active backend:</b><br/>
              <span className="text-mono" style={{fontSize:11.5}}>{CONFIG.BACKEND_URL || 'none — local mode'}</span><br/><br/>
              <b style={{color:'var(--txt)'}}>Pipeline:</b> yt-dlp → OpenAI Whisper → ElevenLabs Scribe (fallback) → Anthropic Claude summarization
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <span className="hint">Persists per-device</span>
          <button className="btn primary" onClick={save}>Save</button>
        </div>
      </div>
    </div>
  );
};

const Toast = ({ toasts }) => (
  <div className="toast-wrap">
    {toasts.map(t => (
      <div key={t.id} className={'toast ' + (t.type || '')}>{t.msg}</div>
    ))}
  </div>
);

// ============================================================================
// ROOT APP
// ============================================================================
function App() {
  const [view, setView] = useState('wizard');           // 'wizard' | 'library'
  const [wizardStep, setWizardStep] = useState(1);
  const [activeLink, setActiveLink] = useState(null);
  const [activeId, setActiveId] = useState(null);

  const [links, setLinks] = useState([]);
  const [allLinks, setAllLinks] = useState([]);
  const [loading, setLoading] = useState(false);

  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');

  const [busy, setBusy] = useState(false);
  const [showPrompt, setShowPrompt] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [toasts, setToasts] = useState([]);

  const toast = useCallback((msg, type) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(()=>setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  // Load all links (for library, recent strip)
  const loadAll = useCallback(async () => {
    const { data, error } = await sb.from('vi_links').select('*').order('created_at', { ascending: false }).limit(500);
    if (error) { toast('Load failed: '+error.message,'error'); return; }
    setAllLinks(data || []);
    if (!search && filter === 'all') setLinks(data || []);
  }, [toast, search, filter]);

  useEffect(() => {
    loadAll();
    const ch = sb.channel('vi_links_changes').on('postgres_changes', { event:'*', schema:'public', table:'vi_links' }, () => { loadAll(); }).subscribe();
    return () => sb.removeChannel(ch);
  }, [loadAll]);

  // Update activeLink from realtime updates
  useEffect(() => {
    if (activeId) {
      const fresh = allLinks.find(l => l.id === activeId);
      if (fresh) setActiveLink(fresh);
    }
  }, [allLinks, activeId]);

  // Search + filter
  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      // No search, just filter client-side
      if (!search.trim()) {
        let out = allLinks;
        if (filter === 'starred') out = out.filter(l => l.starred);
        else if (filter === 'skills') out = out.filter(l => l.skill_prompt);
        else if (filter === 'failed') out = out.filter(l => l.status === 'failed');
        else if (filter !== 'all') out = out.filter(l => l.platform === filter);
        if (!cancelled) { setLinks(out); setLoading(false); }
        return;
      }
      // Server-side full-text search
      setLoading(true);
      // Build websearch-friendly query: split into words, OR them together
      const terms = search.trim().split(/\s+/).map(t => t + ':*').join(' & ');
      let q = sb.from('vi_links').select('*').textSearch('search_vector', terms, { config:'english' }).order('created_at', { ascending: false }).limit(200);
      const { data, error } = await q;
      if (cancelled) return;
      if (error) {
        // Fallback: client-side ilike
        const s = search.toLowerCase();
        const out = allLinks.filter(l =>
          (l.title||'').toLowerCase().includes(s) ||
          (l.author||'').toLowerCase().includes(s) ||
          (l.summary||'').toLowerCase().includes(s) ||
          (l.transcript||'').toLowerCase().includes(s) ||
          (l.call_to_action||'').toLowerCase().includes(s)
        );
        setLinks(out);
      } else {
        let out = data || [];
        if (filter === 'starred') out = out.filter(l => l.starred);
        else if (filter === 'skills') out = out.filter(l => l.skill_prompt);
        else if (filter === 'failed') out = out.filter(l => l.status === 'failed');
        else if (filter !== 'all') out = out.filter(l => l.platform === filter);
        setLinks(out);
      }
      setLoading(false);
    };
    const t = setTimeout(run, 200); // debounce
    return () => { cancelled = true; clearTimeout(t); };
  }, [search, filter, allLinks]);

  // ---- Actions ----
  const submitUrl = async (url) => {
    setBusy(true);
    try {
      const platform = detectPlatform(url);
      const { data, error } = await sb.from('vi_links').insert({ url, platform, status: 'pending' }).select().single();
      if (error) throw error;
      setActiveId(data.id);
      setActiveLink(data);
      setWizardStep(2);
      setView('wizard');
      toast('Added to queue','success');
      if (CONFIG.BACKEND_URL) {
        try {
          await sb.from('vi_links').update({ status: 'processing' }).eq('id', data.id);
          const r = await fetch(CONFIG.BACKEND_URL.replace(/\/$/,'') + '/transcribe', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ id: data.id, url })
          });
          if (!r.ok) throw new Error('Backend returned ' + r.status);
        } catch (e) {
          await sb.from('vi_links').update({ status: 'failed', error: e.message }).eq('id', data.id);
          toast('Backend error: '+e.message,'error');
        }
      }
    } catch (e) {
      toast('Insert failed: '+e.message,'error');
    } finally {
      setBusy(false);
    }
  };

  const updateLink = async (id, patch) => {
    const { error } = await sb.from('vi_links').update(patch).eq('id', id);
    if (error) toast('Update failed: '+error.message,'error');
  };

  const deleteLink = async (id) => {
    const { error } = await sb.from('vi_links').delete().eq('id', id);
    if (error) { toast('Delete failed: '+error.message,'error'); return; }
    if (activeId === id) { setActiveId(null); setActiveLink(null); }
    setView('library');
    toast('Deleted','success');
  };

  const openLink = (l) => {
    setActiveId(l.id);
    setActiveLink(l);
    if (l.status === 'done' || l.status === 'failed') {
      setView('library-detail');
    } else {
      setView('wizard');
      setWizardStep(2);
    }
  };

  const newWizard = () => {
    setActiveId(null);
    setActiveLink(null);
    setWizardStep(1);
    setView('wizard');
  };

  // Auto-advance from step 2 to step 3 once done
  useEffect(() => {
    if (view === 'wizard' && wizardStep === 2 && activeLink?.status === 'done') {
      setWizardStep(3);
    }
  }, [activeLink, wizardStep, view]);

  const recentLinks = useMemo(() =>
    allLinks.filter(l => l.status === 'done' || l.status === 'failed').slice(0, 5),
    [allLinks]
  );

  return (
    <div className="app">
      <Header view={view==='library-detail'?'library':view} setView={(v)=>{ setView(v); if(v==='wizard') newWizard(); }} onSettings={()=>setShowSettings(true)} count={allLinks.length}/>

      <main>
        {view === 'wizard' && (
          <div className="wizard">
            <Stepper current={wizardStep}/>
            {wizardStep === 1 && (
              <StepAdd
                onSubmit={submitUrl}
                busy={busy}
                recent={recentLinks}
                onPickRecent={openLink}
              />
            )}
            {wizardStep === 2 && activeLink && (
              <StepProgress
                link={activeLink}
                onContinue={()=>setWizardStep(3)}
                onBack={newWizard}
              />
            )}
            {wizardStep === 3 && activeLink && (
              <ReviewBody
                link={activeLink}
                onUpdate={updateLink}
                onDelete={deleteLink}
                onSkillPrompt={(l)=>setShowPrompt(l)}
                onNew={newWizard}
                toast={toast}
              />
            )}
          </div>
        )}

        {view === 'library' && (
          <Library
            links={links}
            onOpen={openLink}
            search={search}
            setSearch={setSearch}
            filter={filter}
            setFilter={setFilter}
            hasSearch={!!search.trim()}
            loading={loading}
          />
        )}

        {view === 'library-detail' && activeLink && (
          <div className="wizard">
            <ReviewBody
              link={activeLink}
              onUpdate={updateLink}
              onDelete={deleteLink}
              onSkillPrompt={(l)=>setShowPrompt(l)}
              onBack={()=>setView('library')}
              toast={toast}
              isLibrary
            />
          </div>
        )}
      </main>

      <footer className="foot">
        <span>Powered by <a href="https://ai-loren.com" target="_blank" rel="noreferrer">Loren AI</a> · Video Intel v2.0</span>
        <span className="hide-mobile">{CONFIG.BACKEND_URL ? '⬢ Hosted' : '○ Local mode'}</span>
      </footer>

      <Toast toasts={toasts}/>
      {showPrompt && <PromptModal link={showPrompt} onClose={()=>setShowPrompt(null)} toast={toast}/>}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} toast={toast}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
