<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Video Intel — Loren AI</title>
<meta name="description" content="Loren AI's video intelligence tool. Drop TikTok, Reel, or YouTube links — get transcripts, summaries, CTAs, and Claude skill prompts." />
<meta name="theme-color" content="#ffffff" />
<meta property="og:title" content="Video Intel — Loren AI" />
<meta property="og:description" content="Drop video links. Get real skills." />
<meta property="og:url" content="https://video-intel.ai-loren.com" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%2334C4C4'/><path d='M22 18 L22 46 L42 46 M22 32 L42 32' stroke='%23ffffff' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:hsl(0 0% 100%); --bg-soft:hsl(210 20% 98%); --bg-2:hsl(220 14% 96%);
    --surface:hsl(0 0% 100%); --line:hsl(220 14% 92%); --line-2:hsl(220 14% 86%);
    --txt:hsl(0 0% 0%); --txt-2:hsl(215 16% 47%); --txt-3:hsl(215 16% 65%); --txt-faint:hsl(215 16% 80%);
    --teal:hsl(178 68% 45%); --teal-mid:hsl(178 68% 55%); --teal-bright:hsl(178 68% 65%);
    --teal-soft:hsl(178 68% 96%); --teal-glow:hsl(178 68% 55% / 0.18);
    --green:hsl(142 71% 38%); --red:hsl(0 78% 55%); --warning:hsl(38 92% 50%);
    --shadow-sm:0 1px 2px hsl(0 0% 0% / 0.04);
    --shadow:0 4px 16px hsl(0 0% 0% / 0.06), 0 1px 3px hsl(0 0% 0% / 0.04);
    --shadow-lg:0 12px 32px hsl(0 0% 0% / 0.10);
    --shadow-teal:0 8px 32px hsl(178 68% 55% / 0.18);
    --gradient-teal:linear-gradient(135deg, hsl(178 68% 45%), hsl(178 68% 65%));
    --radius:0.75rem; --radius-sm:0.5rem; --radius-lg:1rem;
    --inter:'Inter',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:var(--inter);-webkit-font-smoothing:antialiased}
  body{min-height:100vh}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:var(--teal-mid)}
  button{font-family:var(--inter)}

  .app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}

  header.bar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit}
  .brand .logo{width:36px;height:36px;border-radius:9px;background:var(--gradient-teal);display:grid;place-items:center;box-shadow:var(--shadow-teal)}
  .brand .logo svg{width:18px;height:18px;color:#fff}
  .brand .name{display:flex;flex-direction:column;line-height:1.15}
  .brand .name .top{font-weight:700;font-size:15px;letter-spacing:-0.01em}
  .brand .name .top span{color:var(--teal-mid)}
  .brand .name .bottom{font-size:10.5px;color:var(--txt-3);letter-spacing:.16em;text-transform:uppercase;font-weight:600;margin-top:2px}
  nav.menu{display:flex;align-items:center;gap:4px}
  nav.menu button{color:var(--txt-2);background:transparent;border:none;font-size:13.5px;font-weight:500;padding:8px 14px;border-radius:7px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
  nav.menu button:hover{color:var(--txt);background:var(--bg-2)}
  nav.menu button.active{color:var(--teal);background:var(--teal-soft)}
  nav.menu button svg{width:14px;height:14px}
  nav.menu .divider{width:1px;height:20px;background:var(--line);margin:0 6px}

  main{padding:32px 28px;max-width:1320px;margin:0 auto;width:100%}
  @media(max-width:700px){main{padding:20px 16px}}

  .wizard{max-width:880px;margin:0 auto}
  .stepper{display:flex;align-items:center;padding:18px 24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:24px}
  .step-item{display:flex;align-items:center;gap:10px;flex:1}
  .step-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:600;font-size:13px;background:var(--bg-2);color:var(--txt-3);border:2px solid var(--line);transition:all .25s}
  .step-item.done .step-num{background:var(--teal);color:#fff;border-color:var(--teal)}
  .step-item.active .step-num{background:var(--gradient-teal);color:#fff;border-color:var(--teal-bright);box-shadow:0 0 0 4px var(--teal-glow)}
  .step-label{font-size:13px;font-weight:500;color:var(--txt-3);transition:color .2s}
  .step-item.done .step-label,.step-item.active .step-label{color:var(--txt)}
  .step-line{flex:1;height:2px;background:var(--line);margin:0 8px;transition:background .25s}
  .step-line.done{background:var(--teal)}
  @media(max-width:640px){.step-label{display:none}}

  .step-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow)}
  @media(max-width:640px){.step-card{padding:28px 22px}}
  .step-card .eyebrow{font-size:11px;color:var(--teal);font-weight:700;letter-spacing:.18em;text-transform:uppercase;margin-bottom:10px}
  .step-card h1{font-size:32px;font-weight:700;letter-spacing:-0.025em;line-height:1.15;margin:0 0 12px}
  .step-card h1 em{color:var(--teal);font-style:normal}
  .step-card .lede{font-size:15.5px;line-height:1.65;color:var(--txt-2);margin:0 0 28px;max-width:580px}

  .urls-textarea-wrap{background:var(--bg-soft);border:2px solid var(--line-2);border-radius:var(--radius);overflow:hidden;transition:all .15s}
  .urls-textarea-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-glow);background:var(--surface)}
  .urls-textarea-wrap textarea{width:100%;background:transparent;border:none;outline:none;resize:vertical;padding:16px 18px;font-family:var(--mono);font-size:13.5px;color:var(--txt);min-height:120px;line-height:1.6}
  .urls-textarea-wrap textarea::placeholder{color:var(--txt-faint)}
  .urls-foot{border-top:1px solid var(--line);padding:10px 14px;background:var(--bg-2);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
  .url-detect-summary{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px;color:var(--txt-3)}
  .url-detect-summary .count{font-weight:600;color:var(--txt)}

  .btn-primary{background:var(--gradient-teal);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;box-shadow:var(--shadow-teal);transition:all .2s;display:inline-flex;align-items:center;gap:7px}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px hsl(178 68% 55% / 0.3)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

  .platform-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.05em}
  .pp-youtube{background:#fdebec;color:#c4334b}
  .pp-tiktok{background:#e6f4f8;color:#236f87}
  .pp-instagram{background:#fbe9f4;color:#a4448a}
  .pp-other{background:var(--bg-2);color:var(--txt-3)}

  /* PROGRESS LIST */
  .batch-summary{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:18px}
  .batch-summary .stats{display:flex;gap:18px;font-size:13px;color:var(--txt-2)}
  .batch-summary .stats b{color:var(--txt);font-weight:600}
  .progress-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
  .pitem{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:all .2s}
  .pitem.done{border-color:var(--green)}
  .pitem.failed{border-color:var(--red);background:#fbe9e9}
  .pitem-row{padding:12px 16px;display:flex;align-items:center;gap:14px}
  .pitem-thumb{flex-shrink:0;width:72px;height:48px;border-radius:6px;background:var(--bg-2);overflow:hidden;display:grid;place-items:center;color:var(--txt-3)}
  .pitem-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .pitem-icon{flex-shrink:0;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--bg-2);color:var(--txt-3)}
  .pitem.processing .pitem-icon{background:var(--gradient-teal);color:#fff}
  .pitem.done .pitem-icon{background:var(--green);color:#fff}
  .pitem.failed .pitem-icon{background:var(--red);color:#fff}
  .pitem-body{flex:1;min-width:0}
  .pitem-title{font-weight:600;font-size:13.5px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pitem-sub{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--txt-3);margin-top:3px;flex-wrap:wrap}
  .pitem-actions{display:flex;gap:6px;align-items:center}
  .progress-bar{height:4px;background:var(--bg-2);border-top:1px solid var(--line);position:relative;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--gradient-teal);transition:width .5s linear;box-shadow:0 0 12px hsl(178 68% 55% / 0.4)}
  .pitem.done .progress-bar-fill{background:var(--green);box-shadow:none}
  .pitem.failed .progress-bar-fill{background:var(--red);box-shadow:none}
  .eta-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:99px;background:var(--teal-soft);color:var(--teal);font-size:11px;font-weight:600;font-family:var(--mono)}
  .eta-pill.done{background:#e3f5e8;color:var(--green)}
  .eta-pill.failed{background:#fbe9e9;color:var(--red)}

  /* REVIEW + VIDEO EMBED */
  .review-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden}
  .video-embed{background:#000;position:relative;width:100%;aspect-ratio:16/9;max-height:520px}
  .video-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
  .video-embed.vertical{aspect-ratio:9/16;max-height:640px;background:#000}
  .video-embed.vertical iframe{max-width:380px;left:50%;transform:translateX(-50%)}
  .video-thumb-fallback{width:100%;height:100%;background-size:cover;background-position:center;display:grid;place-items:center;position:absolute;inset:0}
  .video-thumb-fallback .play{width:80px;height:80px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(6px);display:grid;place-items:center;color:#fff;border:2px solid rgba(255,255,255,0.4);cursor:pointer;transition:all .2s}
  .video-thumb-fallback .play:hover{background:rgba(0,0,0,0.7);transform:scale(1.05)}
  .video-thumb-fallback .play svg{width:32px;height:32px;margin-left:4px}

  .review-head{padding:28px 40px 0}
  @media(max-width:640px){.review-head{padding:22px 22px 0}}
  .review-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--txt-3);margin-bottom:14px;flex-wrap:wrap}
  .review-meta .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .d-pending{background:var(--warning);animation:pulse 1.5s infinite}
  .d-processing{background:var(--teal);animation:pulse 1.2s infinite}
  .d-done{background:var(--green)}
  .d-failed{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .review-title{font-size:28px;font-weight:700;letter-spacing:-0.025em;line-height:1.2;margin:0 0 10px;color:var(--txt)}
  .review-sub{display:flex;flex-wrap:wrap;gap:14px;color:var(--txt-3);font-size:13px;align-items:center;margin-bottom:24px}
  .review-sub a{color:var(--txt-2);text-decoration:none;border-bottom:1px solid var(--line-2);transition:all .15s}
  .review-sub a:hover{color:var(--teal);border-color:var(--teal)}
  .review-sub .sep{color:var(--line-2)}
  .review-actions{display:flex;flex-wrap:wrap;gap:8px;padding:0 40px 24px;border-bottom:1px solid var(--line)}
  @media(max-width:640px){.review-actions{padding:0 22px 20px}}

  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);color:var(--txt);padding:9px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .15s;text-decoration:none}
  .btn:hover{border-color:var(--teal-mid);color:var(--teal);background:var(--teal-soft)}
  .btn.primary{background:var(--gradient-teal);color:#fff;border-color:var(--teal-mid);font-weight:600;box-shadow:var(--shadow-teal)}
  .btn.primary:hover{color:#fff;transform:translateY(-1px)}
  .btn.danger:hover{border-color:var(--red);color:var(--red);background:#fbe9e9}
  .btn.ghost{background:transparent;border-color:transparent}
  .btn-back{background:transparent;border:none;color:var(--txt-2);font-size:13.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:6px;transition:all .15s}
  .btn-back:hover{background:var(--bg-2);color:var(--txt)}

  .review-body{padding:32px 40px}
  @media(max-width:640px){.review-body{padding:24px 22px}}
  .section{margin-bottom:32px}
  .section:last-child{margin-bottom:0}
  .section h3{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal);font-weight:700;margin:0 0 12px;display:flex;align-items:center;justify-content:space-between}
  .section .body{font-size:15px;line-height:1.7;color:var(--txt)}
  .section ul{margin:0;padding:0 0 0 20px}
  .section li{margin-bottom:8px;line-height:1.6}
  .section li::marker{color:var(--teal)}
  .cta-card{background:var(--gradient-teal);border-radius:var(--radius-lg);padding:24px 26px;color:#fff;box-shadow:var(--shadow-teal)}
  .cta-card .label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:10px;opacity:.85}
  .cta-card .text{font-size:16.5px;line-height:1.55;font-weight:500}
  .transcript{background:var(--bg-soft);border:1px solid var(--line);border-radius:var(--radius);padding:18px 22px;font-family:var(--mono);font-size:13px;line-height:1.7;color:var(--txt-2);max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-word}
  .transcript-meta{font-size:11px;color:var(--txt-3);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .verify-row{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .verify-row:last-child{border-bottom:none}
  .verify-status{flex-shrink:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;padding:3px 9px;border-radius:99px}
  .vs-verified{background:#e3f5e8;color:var(--green)}
  .vs-unverified{background:#fdf4e0;color:var(--warning)}
  .vs-contradicted{background:#fbe9e9;color:var(--red)}

  /* LIBRARY HEAD + VIEW TOGGLE */
  .lib-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:18px;flex-wrap:wrap}
  .lib-head h1{font-size:28px;font-weight:700;letter-spacing:-0.025em;margin:0}
  .lib-head .count{font-size:13px;color:var(--txt-3);margin-left:8px;font-weight:500}

  .view-toggle{display:inline-flex;background:var(--bg-soft);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px}
  .view-toggle button{background:transparent;border:none;color:var(--txt-3);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
  .view-toggle button:hover{color:var(--txt)}
  .view-toggle button.active{background:var(--surface);color:var(--txt);box-shadow:var(--shadow-sm)}
  .view-toggle button svg{width:14px;height:14px}

  .search-bar{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:8px 8px 8px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-sm);transition:all .15s;margin-bottom:14px}
  .search-bar:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-glow)}
  .search-bar svg{flex-shrink:0;color:var(--txt-3);width:16px;height:16px}
  .search-bar input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--txt);padding:8px 0}
  .search-bar input::placeholder{color:var(--txt-3)}
  .search-bar kbd{font-size:11px;color:var(--txt-3);background:var(--bg-2);border:1px solid var(--line);padding:3px 6px;border-radius:4px;font-family:var(--mono)}
  .search-bar .clear{background:transparent;border:none;color:var(--txt-3);cursor:pointer;padding:6px 10px;border-radius:6px;font-size:12px}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
  .filters .chip{background:var(--surface);border:1px solid var(--line);color:var(--txt-2);padding:6px 13px;border-radius:99px;font-size:12.5px;cursor:pointer;font-weight:500;transition:all .15s}
  .filters .chip.active{background:var(--txt);color:#fff;border-color:var(--txt)}
  .filters .chip:hover:not(.active){border-color:var(--teal-mid);color:var(--teal)}

  /* GRID VIEW */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;box-shadow:var(--shadow-sm)}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--teal-mid)}
  .card-thumb{width:100%;aspect-ratio:16/9;background:var(--bg-2);position:relative;overflow:hidden}
  .card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card-thumb .platform-overlay{position:absolute;top:8px;left:8px}
  .card-thumb .duration-overlay{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.75);color:#fff;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;font-family:var(--mono)}
  .card-thumb-empty{width:100%;height:100%;display:grid;place-items:center;color:var(--txt-faint)}
  .card-thumb-empty svg{width:32px;height:32px}
  .card-body{padding:14px 18px;flex:1;display:flex;flex-direction:column}
  .card-title{font-size:15px;font-weight:600;letter-spacing:-0.01em;line-height:1.4;color:var(--txt);margin:0 0 6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-author{font-size:12px;color:var(--txt-3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .card-summary{font-size:13px;color:var(--txt-2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1;margin-bottom:10px}
  .card-foot{padding:8px 18px;border-top:1px solid var(--line);background:var(--bg-soft);display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--txt-3)}
  .card-foot .badges{display:flex;gap:6px}
  .card-foot .badge{padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
  .badge-skill{background:var(--teal-soft);color:var(--teal)}
  .badge-star{background:#fef4e0;color:var(--warning)}
  .badge-status{display:inline-flex;align-items:center;gap:4px}

  /* TABLE VIEW */
  .table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
  .vtable{width:100%;border-collapse:collapse;font-size:13px}
  .vtable thead th{
    background:var(--bg-soft);text-align:left;padding:12px 14px;font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--txt-3);font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;
  }
  .vtable tbody tr{border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .vtable tbody tr:hover{background:var(--bg-soft)}
  .vtable tbody tr:last-child{border-bottom:none}
  .vtable td{padding:11px 14px;vertical-align:middle;color:var(--txt-2)}
  .vtable td.col-thumb{width:80px;padding:8px 0 8px 14px}
  .vtable td.col-thumb .tt{width:64px;height:40px;border-radius:5px;overflow:hidden;background:var(--bg-2);display:grid;place-items:center;color:var(--txt-faint)}
  .vtable td.col-thumb .tt img{width:100%;height:100%;object-fit:cover}

  if (!url) return 'other';

  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('tiktok.com')) return 'tiktok';
  if (u.includes('instagram.com')) return 'instagram';

};

const fmtRelative = (iso) => {
  if (!iso) return '';
  const t = new Date(iso).getTime();
  const s = Math.floor((Date.now() - t) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  if (s < 604800) return Math.floor(s/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
};
const fmtDuration = (sec) => {
  if (!sec) return '';
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
};
const fmtSeconds = (sec) => {
  if (sec == null || sec < 0) return '—';
  if (sec < 1) return '<1s';
  if (sec < 60) return Math.round(sec) + 's';
  const m = Math.floor(sec/60), s = Math.round(sec%60);
  return m + 'm ' + s + 's';
};
const parseUrls = (text) => {
  if (!text) return [];
  const parts = text.split(/[\s,;]+/).map(s => s.trim()).filter(Boolean);
  const seen = new Set();
  return parts.filter(p => { if (!/^https?:\/\//i.test(p)) return false; if (seen.has(p)) return false; seen.add(p); return true; });
};
const estimatePipelineSeconds = (platform) => ({youtube:12, tiktok:22, instagram:28, other:22}[platform] || 22);

const computeProgress = (link, now) => {
  if (!link) return { pct: 0, eta: null, elapsed: 0, stage: 'pending' };
  if (link.status === 'done') return { pct: 100, eta: 0, elapsed: 0, stage: 'done' };
  if (link.status === 'failed') return { pct: 100, eta: 0, elapsed: 0, stage: 'failed' };
  const startMs = new Date(link.created_at || Date.now()).getTime();
  const elapsed = (now - startMs) / 1000;
  const total = estimatePipelineSeconds(link.platform);
  const eta = Math.max(0, total - elapsed);
  const raw = elapsed / total;
  let pct;
  if (raw < 0.6) pct = raw * 100;
  else if (raw < 1.0) pct = 60 + (raw - 0.6) * 70;
  else pct = Math.min(92, 88 + (raw - 1.0) * 4);
  return { pct: Math.min(92, Math.max(2, pct)), eta, elapsed, stage: link.status };
};

// Extract video ID for embed URLs
const getVideoId = (url, platform) => {
  if (!url) return null;
  if (platform === 'youtube') {
    const m = url.match(/(?:v=|\/shorts\/|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }
  if (platform === 'tiktok') {
    const m = url.match(/\/video\/(\d+)/);
    return m ? m[1] : null;
  }
  if (platform === 'instagram') {
    const m = url.match(/\/(?:reel|reels|p|tv)\/([A-Za-z0-9_-]+)/);
    return m ? m[1] : null;
  }
  return null;
};

  const id = link.video_id || getVideoId(link.url, link.platform);
  if (!id) return null;
  if (link.platform === 'youtube') return `https://www.youtube.com/embed/${id}`;
  if (link.platform === 'instagram') return `https://www.instagram.com/p/${id}/embed/`;
  // TikTok embed
  if (link.platform === 'tiktok') return `https://www.tiktok.com/embed/v2/${id}`;
  return null;
};

};

Sign off as "Mike" if you write any test artifacts.`;

const ProgressItem = ({ link, now, onOpen, onDismiss }) => {
  const prog = computeProgress(link, now);
  const isDone = prog.stage === 'done';
  const isFailed = prog.stage === 'failed';
  const thumb = getFallbackThumb(link);
  return (
    <div className={'pitem ' + prog.stage}>
      <div className="pitem-row">
        <div className="pitem-thumb">
          {thumb ? <img src={thumb} alt=""/> : <I.film/>}
        </div>
        <div className="pitem-icon">{isDone ? <I.check/> : isFailed ? <I.x/> : <span className="spinner white"/>}</div>
        <div className="pitem-body">
          <div className="pitem-title">{link.title || link.url}</div>
          <div className="pitem-sub">
            <span className={'platform-pill pp-' + (link.platform||'other')} style={{padding:'2px 8px',fontSize:10}}>{platformShort(link.platform)}</span>
            {!isDone && !isFailed && (<>
              <span className={'eta-pill ' + prog.stage}>{fmtSeconds(prog.eta)} left</span>
              <span style={{color:'var(--txt-3)'}}>· {Math.round(prog.pct)}% · {fmtSeconds(prog.elapsed)} elapsed</span>
            </>)}
            {isDone && (<>
              <span className="eta-pill done">Done</span>
              <span style={{color:'var(--txt-3)'}}>· {link.transcript_source || 'captions'}</span>
              {link.duration_sec ? <span style={{color:'var(--txt-3)'}}>· {fmtDuration(link.duration_sec)}</span> : null}
            </>)}
            {isFailed && (<>
              <span className="eta-pill failed">Failed</span>
              <span style={{color:'var(--red)',fontFamily:'var(--mono)',fontSize:11,overflow:'hidden',textOverflow:'ellipsis',maxWidth:340,whiteSpace:'nowrap'}} title={link.error}>{link.error}</span>
            </>)}
          </div>
        </div>
        <div className="pitem-actions">
          {isDone && <button className="btn" onClick={()=>onOpen(link)}><I.eye/> Review</button>}
          {(isDone || isFailed) && <button className="btn ghost" onClick={()=>onDismiss(link.id)}><I.x/></button>}
        </div>
      </div>
      <div className="progress-bar"><div className="progress-bar-fill" style={{ width: prog.pct + '%' }}/></div>
    </div>
  );
};

const StepBatchProgress = ({ batch, links, onOpen, onDismiss, onAddMore, onAllDone, onBack }) => {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const t = setInterval(() => setNow(Date.now()), 500); return () => clearInterval(t); }, []);
  const items = batch.map(id => links.find(l => l.id === id)).filter(Boolean);
  const counts = items.reduce((c, l) => { c[l.status] = (c[l.status]||0) + 1; return c; }, {});
  const pending = (counts.pending||0) + (counts.processing||0);
  const done = counts.done || 0;
  const failed = counts.failed || 0;
  const allDone = items.length > 0 && pending === 0;
  const aggEta = items.filter(l => l.status === 'pending' || l.status === 'processing').map(l => computeProgress(l, now).eta).reduce((max, e) => Math.max(max, e || 0), 0);
  return (
    <div className="step-card">
      <div className="eyebrow">Step 2 of 3 · {items.length} {items.length===1?'video':'videos'}</div>
      <h1>{allDone ? 'All set' : 'Processing'} <em>{items.length>1?`${items.length} videos`:items[0]?.title||'your video'}</em></h1>
      <p className="lede">{allDone ? `${done} done${failed?`, ${failed} failed`:''}. Click any item to review, or add more.` : `${pending} in flight, ${done} done${failed?`, ${failed} failed`:''}. Backend runs them in parallel.`}</p>
      <div className="batch-summary">
        <div className="stats"><span><b>{done}</b> done</span><span><b>{pending}</b> processing</span>{failed>0 && <span style={{color:'var(--red)'}}><b>{failed}</b> failed</span>}</div>
        <div>{!allDone ? <span className="eta-pill">{fmtSeconds(aggEta)} left</span> : <span className="eta-pill done"><I.check style={{width:11,height:11}}/> All done</span>}</div>
      </div>
      <div className="progress-list">{items.map(l => <ProgressItem key={l.id} link={l} now={now} onOpen={onOpen} onDismiss={onDismiss}/>)}</div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
        <button className="btn-back" onClick={onBack}><I.back/> Back</button>
        <div style={{display:'flex',gap:8}}>
          <button className="btn" onClick={onAddMore}><I.plus/> Add more</button>
          {allDone && done === 1 && <button className="btn-primary" onClick={onAllDone}>Review <I.next/></button>}
        </div>
      </div>
    </div>
  );
};

function App() {
  const [view, setView] = useState('wizard');
  const [wizardStep, setWizardStep] = useState(1);
  const [batchIds, setBatchIds] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [allLinks, setAllLinks] = useState([]);
  const [linksFiltered, setLinksFiltered] = useState([]);
  const [loading, setLoading] = useState(false);
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [viewMode, setViewMode] = useState(localStorage.getItem('vi_view_mode') || 'grid');
  const [busy, setBusy] = useState(false);
  const [showPrompt, setShowPrompt] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [toasts, setToasts] = useState([]);

  useEffect(() => { localStorage.setItem('vi_view_mode', viewMode); }, [viewMode]);

  const toast = useCallback((msg, type) => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(()=>setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  const loadAll = useCallback(async () => {
    const { data, error } = await sb.from('vi_links').select('*').order('created_at', { ascending: false }).limit(500);
    if (error) { toast('Load failed: '+error.message,'error'); return; }
    setAllLinks(data || []);
  }, [toast]);

  useEffect(() => {
    loadAll();
    const ch = sb.channel('vi_links_changes').on('postgres_changes', { event:'*', schema:'public', table:'vi_links' }, () => { loadAll(); }).subscribe();
    return () => sb.removeChannel(ch);
  }, [loadAll]);

  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      if (!search.trim()) {
        let out = allLinks;
        if (filter === 'starred') out = out.filter(l => l.starred);
        else if (filter === 'skills') out = out.filter(l => l.skill_prompt);
        else if (filter === 'failed') out = out.filter(l => l.status === 'failed');
        else if (filter !== 'all') out = out.filter(l => l.platform === filter);
        if (!cancelled) { setLinksFiltered(out); setLoading(false); }
        return;
      }
      setLoading(true);
      const terms = search.trim().split(/\s+/).map(t => t + ':*').join(' & ');
      const { data, error } = await sb.from('vi_links').select('*').textSearch('search_vector', terms, { config:'english' }).order('created_at', { ascending: false }).limit(200);
      if (cancelled) return;
      if (error) {
        const s = search.toLowerCase();
        setLinksFiltered(allLinks.filter(l =>
          (l.title||'').toLowerCase().includes(s) ||
          (l.author||'').toLowerCase().includes(s) ||
          (l.summary||'').toLowerCase().includes(s) ||
          (l.transcript||'').toLowerCase().includes(s) ||
          (l.call_to_action||'').toLowerCase().includes(s)
        ));
      } else {
        let out = data || [];
        if (filter === 'starred') out = out.filter(l => l.starred);
        else if (filter === 'skills') out = out.filter(l => l.skill_prompt);
        else if (filter === 'failed') out = out.filter(l => l.status === 'failed');
        else if (filter !== 'all') out = out.filter(l => l.platform === filter);
        setLinksFiltered(out);
      }
      setLoading(false);
    };
    const t = setTimeout(run, 200);
    return () => { cancelled = true; clearTimeout(t); };
  }, [search, filter, allLinks]);

  const submitBatch = async (urls) => {
    if (urls.length === 0) return;
    setBusy(true);
    try {
      const ids = [];
      for (const url of urls) {
        const platform = detectPlatform(url);
        const { data, error } = await sb.from('vi_links').insert({ url, platform, status: 'pending' }).select().single();
        if (error) { toast('Insert failed: '+error.message,'error'); continue; }
        ids.push(data.id);
        if (CONFIG.BACKEND_URL) {
          (async () => {
            try {
              await sb.from('vi_links').update({ status: 'processing' }).eq('id', data.id);
              const r = await fetch(CONFIG.BACKEND_URL.replace(/\/$/,'') + '/transcribe', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ id: data.id, url })
              });
              if (!r.ok) throw new Error('Backend returned ' + r.status);
            } catch (e) {
              await sb.from('vi_links').update({ status: 'failed', error: e.message }).eq('id', data.id);
            }
          })();
        }
      }
      setBatchIds(ids);
      setActiveId(ids[0] || null);
      setWizardStep(2);
      toast(`Queued ${urls.length} ${urls.length===1?'video':'videos'}`,'success');
    } finally {
      setBusy(false);
    }
  };

  const updateLink = async (id, patch) => {
    const { error } = await sb.from('vi_links').update(patch).eq('id', id);
    if (error) toast('Update failed: '+error.message,'error');
  };

  const deleteLink = async (id) => {
    const { error } = await sb.from('vi_links').delete().eq('id', id);
    if (error) { toast('Delete failed: '+error.message,'error'); return; }
    if (activeId === id) setActiveId(null);
    setBatchIds(b => b.filter(x => x !== id));
    if (view === 'library-detail') setView('library');
    toast('Deleted','success');
  };

  const dismissFromBatch = (id) => setBatchIds(b => b.filter(x => x !== id));

  const openLink = (l) => {
    setActiveId(l.id);
    if (l.status === 'done' || l.status === 'failed') {
      if (view === 'library') setView('library-detail');
      else setWizardStep(3);
    } else {
      setView('wizard');
      setWizardStep(2);
    }
  };

  const newWizard = () => { setBatchIds([]); setActiveId(null); setWizardStep(1); setView('wizard'); };
  const addMore = () => setWizardStep(1);

  const activeLink = useMemo(() => activeId ? allLinks.find(l => l.id === activeId) : null, [activeId, allLinks]);
  const recentLinks = useMemo(() => allLinks.filter(l => l.status === 'done' || l.status === 'failed').slice(0, 5), [allLinks]);

  return (
    <div className="app">
      <Header view={view==='library-detail'?'library':view} setView={(v)=>{ if (v === 'wizard') newWizard(); else setView(v); }} onSettings={()=>setShowSettings(true)} count={allLinks.length}/>
      <main>
        {view === 'wizard' && (
          <div className="wizard">
            <Stepper current={wizardStep}/>
            {wizardStep === 1 && <StepAdd onSubmit={submitBatch} busy={busy} recent={recentLinks} onPickRecent={openLink}/>}
            {wizardStep === 2 && batchIds.length > 0 && (
              <StepBatchProgress
                batch={batchIds} links={allLinks}
                onOpen={openLink} onDismiss={dismissFromBatch} onAddMore={addMore}
                onAllDone={()=>{ if (batchIds.length === 1) { setActiveId(batchIds[0]); setWizardStep(3); } }}
                onBack={newWizard}
              />
            )}
            {wizardStep === 3 && activeLink && (
              <ReviewBody link={activeLink} onUpdate={updateLink} onDelete={deleteLink} onSkillPrompt={(l)=>setShowPrompt(l)} onBack={()=>{ if(batchIds.length>1) setWizardStep(2); else newWizard(); }} onNew={newWizard} toast={toast}/>
            )}
          </div>
        )}
        {view === 'library' && (
          <Library links={linksFiltered} onOpen={openLink} search={search} setSearch={setSearch} filter={filter} setFilter={setFilter} viewMode={viewMode} setViewMode={setViewMode} hasSearch={!!search.trim()} loading={loading}/>
        )}
        {view === 'library-detail' && activeLink && (
          <div className="wizard">
            <ReviewBody link={activeLink} onUpdate={updateLink} onDelete={deleteLink} onSkillPrompt={(l)=>setShowPrompt(l)} onBack={()=>setView('library')} toast={toast} isLibrary/>
          </div>
        )}
      </main>
      <footer className="foot">
        <span>Powered by <a href="https://ai-loren.com" target="_blank" rel="noreferrer">Loren AI</a> · Video Intel v2.3</span>
        <span className="hide-mobile">{CONFIG.BACKEND_URL ? '⬢ Hosted' : '○ Local mode'}</span>
      </footer>
      <Toast toasts={toasts}/>
      {showPrompt && <PromptModal link={showPrompt} onClose={()=>setShowPrompt(null)} toast={toast}/>}
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} toast={toast}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
